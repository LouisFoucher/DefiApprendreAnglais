{passage:`<strong>Subject: Annual Report Published</strong><br><br>The company's annual report is now available on the investor relations page of our website. Key highlights include a <strong>12% increase in revenue</strong> and a <strong>net profit of £4.2 million</strong>. A printed copy is available on request.`,q:`How did revenue change according to the report?`,opts:['Increased by 12%','Decreased by 12%','Increased by 4.2%','Remained unchanged'],ans:0,exp:`<em>"A 12% increase in revenue."</em>`},
{passage:`<strong>Policy Update — Social Media Guidelines</strong><br><br>Employees must not share <strong>confidential company information</strong> on social media. Posts mentioning the company must include a disclaimer stating the views are <strong>personal and not those of the employer</strong>. Violations may result in disciplinary action.`,q:`What must employees include if they post about the company?`,opts:['A personal disclaimer','Company approval','A link to the website','Their job title'],ans:0,exp:`<em>"A disclaimer stating the views are personal and not those of the employer."</em>`},
{passage:`<strong>Internal Email — Charity Fundraiser</strong><br><br>This year's charity fundraiser will take place on <strong>Friday 22nd November</strong>. Staff are invited to wear casual clothing in exchange for a <strong>£2 donation</strong>. All proceeds go to the <strong>local food bank</strong>. Donations can be made via the payroll portal.`,q:`Where do all proceeds go?`,opts:['The local food bank','A national charity','The staff welfare fund','The company charity partner'],ans:0,exp:`<em>"All proceeds go to the local food bank."</em>`},
{passage:`<strong>Notice — Gym Membership Subsidy</strong><br><br>The company will subsidise gym membership up to <strong>£30 per month</strong> for all full-time employees. To claim, submit your monthly gym receipt to HR by the <strong>last working day of each month</strong>. The scheme starts <strong>1st February</strong>.`,q:`What is the maximum monthly subsidy?`,opts:['£30','£25','£50','£20'],ans:0,exp:`<em>"Subsidise gym membership up to £30 per month."</em>`},
{passage:`<strong>Email — Meeting Request</strong><br><br>Dear Mr. Singh, I would like to arrange a meeting to discuss the Q4 results and our plans for the coming year. I am available on <strong>Tuesday 9th</strong> or <strong>Thursday 11th</strong>, preferably in the <strong>afternoon</strong>. Please let me know your availability.`,q:`When is the sender available for the meeting?`,opts:['Tuesday 9th or Thursday 11th afternoon','Monday morning only','Any day next week','Friday afternoon'],ans:0,exp:`<em>"Available on Tuesday 9th or Thursday 11th, preferably in the afternoon."</em>`},
{passage:`<strong>Subject: New Onboarding Checklist</strong><br><br>A revised onboarding checklist has been issued for all new starters. Line managers must ensure all items are completed within the <strong>first two weeks</strong>. The checklist is available on the HR intranet under <strong>New Starter Resources</strong>.`,q:`Where can the checklist be found?`,opts:['HR intranet under New Starter Resources','HR department reception','The company website','Via email request only'],ans:0,exp:`<em>"Available on the HR intranet under New Starter Resources."</em>`},
{passage:`<strong>Email — Apology for Technical Issue</strong><br><br>Dear Valued Customer, we apologise for the disruption to our online platform yesterday between <strong>2:00 PM and 6:00 PM</strong>. The issue was caused by a <strong>server failure</strong> and has now been resolved. All affected orders have been processed.`,q:`What caused the disruption?`,opts:['A server failure','A cyber attack','Planned maintenance','A software update'],ans:0,exp:`<em>"The issue was caused by a server failure."</em>`},
{passage:`<strong>Notice — End of Year Party</strong><br><br>The company's annual end-of-year party will be held at the <strong>Meridian Ballroom</strong> on <strong>December 20th</strong>. Dinner begins at <strong>7:00 PM</strong>. Partners are welcome. Please RSVP to events@company.com by <strong>December 10th</strong>.`,q:`By when must staff RSVP?`,opts:['December 10th','December 20th','December 15th','End of November'],ans:0,exp:`<em>"Please RSVP by December 10th."</em>`},
{passage:`<strong>Subject: Staff Survey Reminder</strong><br><br>This is a reminder to complete the <strong>annual employee satisfaction survey</strong>. The survey takes approximately <strong>10 minutes</strong> and is <strong>completely anonymous</strong>. The deadline is this <strong>Friday at 5:00 PM</strong>.`,q:`What is notable about the survey?`,opts:['It is anonymous','It affects your review','It takes 30 minutes','It is mandatory'],ans:0,exp:`<em>"The survey is completely anonymous."</em>`},
{passage:`<strong>Notice — Emergency Contact Update</strong><br><br>All employees are required to update their emergency contact information via the HR portal by <strong>31st March</strong>. This is part of our updated health and safety compliance requirements.`,q:`Why must employees update their emergency contacts?`,opts:['Health and safety compliance','A new IT system rollout','A company restructure','Annual policy review'],ans:0,exp:`<em>"Part of our updated health and safety compliance requirements."</em>`},
{passage:`<strong>Email — Product Update Notice</strong><br><br>Dear Customer, version <strong>4.2</strong> of our software is now available. This update includes <strong>performance improvements, bug fixes, and a new reporting dashboard</strong>. The update is free for all current subscribers. Download it via your account settings.`,q:`How can customers get the update?`,opts:['Via account settings','By contacting support','By purchasing a new licence','Via the company website'],ans:0,exp:`<em>"Download it via your account settings."</em>`},
{passage:`<strong>Memo — Office Kitchen Rules</strong><br><br>Please ensure that all food is labelled with your name and the date. Items not labelled will be <strong>disposed of every Friday afternoon</strong>. The fridge is cleaned <strong>every two weeks on Wednesdays</strong>.`,q:`When are unlabelled items thrown away?`,opts:['Every Friday afternoon','Every Wednesday','Daily at closing','On the first of each month'],ans:0,exp:`<em>"Items not labelled will be disposed of every Friday afternoon."</em>`},
{passage:`<strong>Job Advertisement — Customer Service Representative</strong><br><br>We are looking for an enthusiastic individual to join our customer-facing team. The role involves responding to enquiries, resolving complaints, and processing orders. <strong>No prior experience required — full training provided</strong>. Apply by <strong>28th February</strong>.`,q:`Is experience required for this role?`,opts:['No — full training is provided','Yes — 2 years minimum','Yes — customer service only','Yes — a relevant degree'],ans:0,exp:`<em>"No prior experience required — full training provided."</em>`},
{passage:`<strong>Internal Email — Parking Permit Renewal</strong><br><br>Annual parking permits expire on <strong>31st March</strong>. To renew, complete the online form and submit payment of <strong>£120 per year</strong> by <strong>15th March</strong>. Permits not renewed by this date will be cancelled without notice.`,q:`How much does an annual parking permit cost?`,opts:['£120','£90','£150','£100'],ans:0,exp:`<em>"Submit payment of £120 per year."</em>`},
{passage:`<strong>Email — New Office Supplies Ordering Process</strong><br><br>From next Monday, all office supply requests must be submitted via the <strong>online procurement portal</strong>. Orders placed through other channels will no longer be processed. Please allow <strong>3 to 5 business days</strong> for delivery.`,q:`How long will deliveries take?`,opts:['3 to 5 business days','1 to 2 days','Up to 2 weeks','Same day'],ans:0,exp:`<em>"Please allow 3 to 5 business days for delivery."</em>`},
{passage:`<strong>Notice — Annual Leave Rollover Policy</strong><br><br>Unused annual leave may be carried over into the next year, up to a maximum of <strong>5 days</strong>. Leave not taken within <strong>3 months of the new year</strong> will be forfeited. There are no exceptions to this policy.`,q:`How many unused leave days can be carried over?`,opts:['Up to 5 days','Up to 10 days','All unused days','None'],ans:0,exp:`<em>"Up to a maximum of 5 days."</em>`},
{passage:`<strong>Announcement — Change in Management</strong><br><br>We are pleased to announce that <strong>Mr. Daniel Park</strong> will be joining us as <strong>Chief Operating Officer</strong> on <strong>1st February</strong>. Mr. Park brings 20 years of experience in operations management across three continents.`,q:`What role will Mr. Park take on?`,opts:['Chief Operating Officer','Chief Executive Officer','Head of Operations','Operations Manager'],ans:0,exp:`<em>"Mr. Park will be joining us as Chief Operating Officer."</em>`},
{passage:`<strong>Email — Invitation to Tender</strong><br><br>We invite your company to submit a tender for the supply of <strong>IT equipment and maintenance services</strong> for our offices over a <strong>three-year period</strong>. Tenders must be submitted by <strong>5:00 PM on 14th October</strong>.`,q:`How long is the contract period?`,opts:['Three years','One year','Five years','Two years'],ans:0,exp:`<em>"Supply of IT equipment for a three-year period."</em>`},
{passage:`<strong>Notice — Updated Dress Code Policy</strong><br><br>Effective from <strong>1st May</strong>, smart casual dress will be permitted on all days except when meeting clients. <strong>Formal business dress</strong> remains required for <strong>client-facing meetings and presentations</strong>.`,q:`When is formal dress still required?`,opts:['Client-facing meetings and presentations','Every day','On Fridays only','Never — smart casual always'],ans:0,exp:`<em>"Formal business dress remains required for client-facing meetings and presentations."</em>`},
{passage:`<strong>Internal Memo — New Sick Leave Process</strong><br><br>From <strong>1st April</strong>, employees must notify their line manager <strong>before 9:30 AM</strong> on their first day of absence. A <strong>self-certification form</strong> is required for absences of <strong>1 to 7 days</strong>. A doctor's certificate is required from day 8.`,q:`When must a doctor's certificate be provided?`,opts:['From day 8','From day 1','After 3 days','Only for extended leave'],ans:0,exp:`<em>"A doctor's certificate is required from day 8."</em>`},
{passage:`<strong>Email — Training Cancellation</strong><br><br>Dear all, we regret to inform you that the Excel training scheduled for <strong>Wednesday 5th</strong> has been cancelled due to the trainer's illness. We will contact you shortly to reschedule. We apologise for any inconvenience.`,q:`Why was the training cancelled?`,opts:["The trainer is ill","The room is unavailable","Not enough participants","A scheduling conflict"],ans:0,exp:`<em>"Cancelled due to the trainer's illness."</em>`},
{passage:`<strong>Notice — IT Password Expiry</strong><br><br>All system passwords will expire on <strong>Friday 30th</strong>. You will be prompted to create a new password upon your next login. Passwords must be <strong>at least 10 characters</strong> and must not repeat any of your last <strong>5 passwords</strong>.`,q:`How many previous passwords cannot be reused?`,opts:['5','3','10','None'],ans:0,exp:`<em>"Must not repeat any of your last 5 passwords."</em>`},
{passage:`<strong>Staff Circular — Office Renovation Schedule</strong><br><br>The third-floor offices will be refurbished from <strong>Monday 7th to Friday 18th</strong>. Staff will be relocated to the <strong>hot-desking area on floor two</strong>. Please take all personal items from your desk by <strong>Friday 4th</strong>.`,q:`Where will third-floor staff work during renovation?`,opts:['Hot-desking area on floor two','From home','The ground floor boardroom','Floor four'],ans:0,exp:`<em>"Staff will be relocated to the hot-desking area on floor two."</em>`},
{passage:`<strong>Email — Price Increase Notice</strong><br><br>Dear Valued Customer, due to rising material costs, we will be increasing our prices by <strong>5%</strong> from <strong>1st August</strong>. Orders placed before this date will be processed at current prices. We appreciate your continued support.`,q:`How can customers avoid the price increase?`,opts:['Place orders before 1st August','Contact the sales team','Order in large quantities','Sign a long-term contract'],ans:0,exp:`<em>"Orders placed before this date will be processed at current prices."</em>`},
{passage:`<strong>Memo — Company Vehicle Booking</strong><br><br>Company vehicles must be booked via the <strong>fleet management system</strong> at least <strong>48 hours in advance</strong>. Vehicles returned late or with fuel below the minimum level will result in a <strong>charge to the employee's department</strong>.`,q:`How far in advance must vehicles be booked?`,opts:['48 hours','24 hours','One week','72 hours'],ans:0,exp:`<em>"Booked via the fleet management system at least 48 hours in advance."</em>`},
{passage:`<strong>Notice — New Supplier Registration</strong><br><br>All new suppliers must complete a <strong>vendor registration form</strong> and provide <strong>proof of insurance and tax compliance</strong> before any contracts can be signed. Processing takes up to <strong>10 business days</strong>.`,q:`What must new suppliers provide before contracts are signed?`,opts:['Proof of insurance and tax compliance','A business plan','References from previous clients','A sample product'],ans:0,exp:`<em>"Proof of insurance and tax compliance."</em>`},
{passage:`<strong>Email — Staff Discount Scheme</strong><br><br>We are pleased to announce a new <strong>staff discount scheme</strong> offering <strong>20% off</strong> all products from our online store. The discount code will be emailed to all permanent employees by <strong>end of this week</strong>.`,q:`When will the discount code be sent?`,opts:['By end of this week','Immediately','Next month','On the first of next month'],ans:0,exp:`<em>"The discount code will be emailed by end of this week."</em>`},
{passage:`<strong>Notice — Workplace Wellbeing Week</strong><br><br>From <strong>Monday 12th to Friday 16th</strong>, we will be hosting a range of wellbeing activities including yoga, mindfulness sessions, and healthy cooking demonstrations. All activities are <strong>free of charge</strong> and open to all staff.`,q:`Who can participate in the wellbeing activities?`,opts:['All staff','Permanent staff only','Senior management','Staff who register in advance'],ans:0,exp:`<em>"Open to all staff."</em>`},
{passage:`<strong>Email — Quarterly Report Summary</strong><br><br>Please find attached the Q2 results. Highlights include a <strong>9% rise in new customer acquisitions</strong>, a <strong>reduction in churn rate from 7% to 4%</strong>, and total revenue of <strong>£3.8 million</strong>.`,q:`What happened to the churn rate in Q2?`,opts:['It fell from 7% to 4%','It rose to 7%','It remained at 4%','It doubled'],ans:0,exp:`<em>"A reduction in churn rate from 7% to 4%."</em>`},
{passage:`<strong>Notice — Updated Meeting Room Policy</strong><br><br>Meeting rooms must be booked through the <strong>online calendar system</strong>. Rooms not used within <strong>15 minutes of the booking start time</strong> will be automatically released. Maximum booking duration is <strong>3 hours</strong>.`,q:`What happens if a room is unused 15 minutes after the booking?`,opts:['It is automatically released','The booking is extended','A reminder is sent','Nothing happens'],ans:0,exp:`<em>"Rooms not used within 15 minutes will be automatically released."</em>`},
{passage:`<strong>Memo — Stationery Budget Reduction</strong><br><br>Due to cost reduction initiatives, the stationery budget per department has been reduced by <strong>25%</strong> from next quarter. Departments are encouraged to use digital alternatives. Orders must be approved by a line manager.`,q:`By how much has the stationery budget been reduced?`,opts:['25%','10%','50%','15%'],ans:0,exp:`<em>"The stationery budget has been reduced by 25%."</em>`},
{passage:`<strong>Email — Welcome to New Portal</strong><br><br>Dear Team, we are excited to launch <strong>MyCompany Hub</strong>, your new employee self-service portal. You can use it to view payslips, book leave, update personal details, and access HR documents. Log in using your existing company credentials.`,q:`What can employees use the new portal for?`,opts:['View payslips, book leave, and access HR docs','Only view payslips','Book meeting rooms','Access the company intranet only'],ans:0,exp:`<em>"View payslips, book leave, update personal details, and access HR documents."</em>`},
{passage:`<strong>Notice — Data Protection Refresher</strong><br><br>All employees must complete the <strong>GDPR refresher training</strong> by <strong>30th June</strong>. The online module takes approximately <strong>20 minutes</strong>. Failure to complete it will result in restricted access to company systems.`,q:`What will happen if the training is not completed?`,opts:['Restricted access to systems','Disciplinary action','Loss of annual leave','A formal warning'],ans:0,exp:`<em>"Failure to complete it will result in restricted access to company systems."</em>`},
{passage:`<strong>Email — Office Move Confirmation</strong><br><br>We are pleased to confirm that our new offices at <strong>25 Harbour View, Bristol</strong> will be ready for occupation from <strong>Monday 10th September</strong>. All staff should report to the new address from that date. Car parking is available on site.`,q:`When will the new offices be ready?`,opts:['Monday 10th September','Monday 17th September','1st October','End of August'],ans:0,exp:`<em>"Ready for occupation from Monday 10th September."</em>`},
{passage:`<strong>Internal Memo — Travel Policy Reminder</strong><br><br>Employees must book all business travel through our <strong>approved travel management system</strong>. Bookings made outside this system will not be reimbursed. Hotel costs are capped at <strong>£150 per night</strong>.`,q:`What is the maximum hotel cost per night?`,opts:['£150','£100','£200','£120'],ans:0,exp:`<em>"Hotel costs are capped at £150 per night."</em>`},
{passage:`<strong>Memo — New Expense Categories</strong><br><br>Effective from <strong>1st January</strong>, the following new expense categories have been added: <strong>home office equipment, co-working space fees, and online course subscriptions</strong>. All existing categories remain unchanged.`,q:`Which of these is a new expense category?`,opts:['Home office equipment','Business meals','Hotel accommodation','Air travel'],ans:0,exp:`<em>"New categories include home office equipment, co-working space fees, and online course subscriptions."</em>`},
{passage:`<strong>Notice — Company Induction Day</strong><br><br>New starters joining on <strong>1st October</strong> will attend a full-day induction. Sessions include an introduction to company values, a tour of the premises, and a briefing with HR. Lunch will be provided. Please arrive at reception by <strong>8:45 AM</strong>.`,q:`What time should new starters arrive?`,opts:['8:45 AM','9:00 AM','8:30 AM','10:00 AM'],ans:0,exp:`<em>"Please arrive at reception by 8:45 AM."</em>`},
{passage:`<strong>Email — Award Nomination</strong><br><br>We are pleased to inform you that you have been nominated for the <strong>Regional Business Excellence Award</strong> in the category of <strong>Best Customer Service Team</strong>. The awards ceremony will take place on <strong>Thursday 19th March</strong> at the Hilton Hotel.`,q:`For which category has the team been nominated?`,opts:['Best Customer Service Team','Best Innovation','Best Employer','Best Product Launch'],ans:0,exp:`<em>"Nominated in the category of Best Customer Service Team."</em>`},
{passage:`<strong>Internal Memo — Fire Safety Update</strong><br><br>Following the annual fire safety inspection, all fire exits on the <strong>second and third floors</strong> have been cleared. The next fire drill will take place on <strong>Thursday 23rd</strong> at <strong>11:00 AM</strong>. All staff must participate.`,q:`When is the next fire drill?`,opts:['Thursday 23rd at 11:00 AM','Friday 24th at 10:00 AM','Wednesday 22nd at 9:00 AM','Thursday 23rd at 2:00 PM'],ans:0,exp:`<em>"The next fire drill will take place on Thursday 23rd at 11:00 AM."</em>`},
{passage:`<strong>Email — Maternity Leave Notification</strong><br><br>Dear Team, I am writing to let you know that I will be going on maternity leave from <strong>1st June</strong>. During my absence, <strong>Ms. Jennifer Wade</strong> will be covering my responsibilities. I look forward to returning in <strong>January</strong>.`,q:`Who will cover the sender's responsibilities?`,opts:['Ms. Jennifer Wade','A temporary hire','The department head','No one — shared by the team'],ans:0,exp:`<em>"Ms. Jennifer Wade will be covering my responsibilities."</em>`},
{passage:`<strong>Notice — Mobile Phone Use Policy</strong><br><br>Personal mobile phones must be set to silent during working hours. Phone calls for personal use should be limited to <strong>break times only</strong>. Excessive personal phone use may be subject to a formal warning.`,q:`When can personal calls be made?`,opts:['During break times only','At any time','In the morning only','Never during work hours'],ans:0,exp:`<em>"Phone calls for personal use should be limited to break times only."</em>`},
{passage:`<strong>Email — Supplier Price Negotiation</strong><br><br>After reviewing your recent quotation, we would like to propose a <strong>10% reduction</strong> on the unit price in exchange for a <strong>12-month exclusive supply agreement</strong>. Please advise whether this is acceptable by <strong>end of next week</strong>.`,q:`What is being proposed in exchange for a price reduction?`,opts:['A 12-month exclusive supply agreement','A larger order volume','An extended payment period','A marketing partnership'],ans:0,exp:`<em>"A 12-month exclusive supply agreement."</em>`},
{passage:`<strong>Notice — Building Security Upgrade</strong><br><br>New biometric access controls will be installed on all entry points from <strong>Monday 4th</strong>. Staff will need to register their fingerprints with the security team before <strong>Friday 1st</strong>. Please book a slot via the intranet.`,q:`By when must staff register their fingerprints?`,opts:['Friday 1st','Monday 4th','End of the month','Immediately'],ans:0,exp:`<em>"Register their fingerprints before Friday 1st."</em>`},
{passage:`<strong>Email — Client Complaint Escalation</strong><br><br>Dear Management Team, we have received a formal complaint from <strong>Meridian Corp</strong> regarding repeated delays in order fulfilment. The client has requested a response within <strong>48 hours</strong>. I recommend we schedule an urgent call with them tomorrow.`,q:`What has the client requested?`,opts:['A response within 48 hours','A full refund','A new account manager','An in-person meeting'],ans:0,exp:`<em>"The client has requested a response within 48 hours."</em>`},
{passage:`<strong>Internal Email — Flexible Working Pilot</strong><br><br>Starting from <strong>1st April</strong>, we will pilot a <strong>4-day working week</strong> for all staff in the customer support division. Working hours on the remaining four days will be extended to <strong>10 hours per day</strong>. The pilot will run for <strong>three months</strong>.`,q:`How long will the pilot run?`,opts:['Three months','One month','Six months','One year'],ans:0,exp:`<em>"The pilot will run for three months."</em>`},
{passage:`<strong>Notice — New Expense Claim Portal</strong><br><br>From <strong>1st February</strong>, all expense claims must be submitted through the new <strong>ExpensePro</strong> system. Paper forms will no longer be accepted. Training sessions are available on <strong>Tuesday afternoons</strong>. Contact IT support to set up your account.`,q:`What will no longer be accepted?`,opts:['Paper forms','Electronic submissions','Late claims','Claims without receipts'],ans:0,exp:`<em>"Paper forms will no longer be accepted."</em>`},
{passage:`<strong>Email — Promotion Announcement</strong><br><br>We are delighted to announce that <strong>Mr. Carlos Rivera</strong> has been promoted to <strong>Head of Sales</strong>, effective <strong>1st March</strong>. Carlos has been with the company for <strong>eight years</strong> and has consistently delivered outstanding results.`,q:`How long has Carlos been with the company?`,opts:['Eight years','Five years','Ten years','Three years'],ans:0,exp:`<em>"Carlos has been with the company for eight years."</em>`},
{passage:`<strong>Memo — IT System Downtime</strong><br><br>The company ERP system will be offline for a scheduled upgrade on <strong>Saturday 14th from 6:00 AM to 2:00 PM</strong>. All transactions must be completed before <strong>Friday 5:00 PM</strong>. Access will be restored automatically after maintenance.`,q:`Until what time must transactions be completed on Friday?`,opts:['5:00 PM','6:00 AM Saturday','2:00 PM Saturday','End of day Friday'],ans:0,exp:`<em>"All transactions must be completed before Friday 5:00 PM."</em>`},
{passage:`<strong>Notice — Cafeteria Menu Change</strong><br><br>From <strong>next Monday</strong>, the cafeteria will introduce a new menu with <strong>more plant-based options</strong>. Hot meals will be served from <strong>12:00 to 2:00 PM</strong>. Feedback forms will be available at the counter.`,q:`When will hot meals be served?`,opts:['12:00 to 2:00 PM','11:30 AM to 1:30 PM','12:30 to 2:30 PM','All day'],ans:0,exp:`<em>"Hot meals will be served from 12:00 to 2:00 PM."</em>`},
{passage:`<strong>Email — Reference Request</strong><br><br>Dear Mr. Thompson, I am applying for the position of Senior Account Manager at Vertex Solutions and have listed you as a reference. Could you please complete the attached reference form and return it directly to HR at Vertex by <strong>15th April</strong>?`,q:`What must Mr. Thompson return and to whom?`,opts:['A reference form to Vertex HR','A letter to the applicant','His own CV to Vertex','Nothing — verbal reference only'],ans:0,exp:`<em>"Complete the attached reference form and return it directly to HR at Vertex."</em>`},
{passage:`<strong>Internal Notice — New Recycling Initiative</strong><br><br>From <strong>next month</strong>, all office floors will have <strong>separate bins</strong> for paper, plastic, and general waste. Staff are asked to familiarise themselves with the <strong>recycling guidelines</strong> posted in each kitchen area.`,q:`Where are the recycling guidelines posted?`,opts:['In each kitchen area','On the HR intranet','At reception','In the staff handbook'],ans:0,exp:`<em>"Recycling guidelines posted in each kitchen area."</em>`},
{passage:`<strong>Email — Budget Freeze Notification</strong><br><br>Due to current economic conditions, the company has implemented a <strong>budget freeze</strong> on all non-essential spending with immediate effect. All purchase requests above <strong>£500</strong> require <strong>board-level approval</strong> until further notice.`,q:`What is required for purchase requests above £500?`,opts:['Board-level approval','Department head approval','Finance team sign-off','No approval — freeze means no spending'],ans:0,exp:`<em>"All purchase requests above £500 require board-level approval."</em>`},
{passage:`<strong>Notice — Subsidised Transport Scheme</strong><br><br>The company is introducing a <strong>subsidised bus pass scheme</strong> for all employees commuting from the city centre. Monthly passes will be available at <strong>50% of the standard cost</strong>. Applications open from <strong>1st March</strong> via the HR portal.`,q:`What discount will employees receive on bus passes?`,opts:['50% off','25% off','75% off','Free of charge'],ans:0,exp:`<em>"Monthly passes will be available at 50% of the standard cost."</em>`},
{passage:`<strong>Email — Proposal Feedback</strong><br><br>Dear Ms. Nguyen, thank you for submitting your proposal for the redesign project. After careful consideration, we would like to move forward. However, we would like to discuss a few minor amendments before signing the contract. Are you available for a call this <strong>Thursday or Friday</strong>?`,q:`Has the proposal been accepted?`,opts:['Yes, with minor amendments','No — it was rejected','Yes, with no changes','Not yet decided'],ans:0,exp:`<em>"We would like to move forward"</em> = accepté, mais avec <em>"minor amendments."</em>`},
{passage:`<strong>Internal Memo — New Document Retention Policy</strong><br><br>Effective from <strong>1st September</strong>, all financial documents must be retained for a minimum of <strong>seven years</strong>. HR records should be kept for a minimum of <strong>three years</strong> after an employee leaves. Any queries should be directed to the compliance team.`,q:`For how long must HR records be retained after an employee leaves?`,opts:['Three years','Seven years','Five years','Ten years'],ans:0,exp:`<em>"HR records should be kept for a minimum of three years after an employee leaves."</em>`},
{passage:`<strong>Email — New Business Proposal</strong><br><br>We are pleased to submit our proposal for the management of your <strong>social media accounts</strong>. Our service includes daily content creation, community management, and <strong>monthly performance reports</strong>. The proposed fee is <strong>£2,500 per month</strong>.`,q:`What does the service include?`,opts:['Content creation, community management, and monthly reports','Only social media posts','Advertising and content only','Monthly meetings only'],ans:0,exp:`<em>"Daily content creation, community management, and monthly performance reports."</em>`},
{passage:`<strong>Notice — Payroll Cut-off Date Change</strong><br><br>Please note that from <strong>next month</strong>, the payroll cut-off date will change from the <strong>20th to the 17th</strong> of each month. Any changes to hours or expenses submitted after the 17th will be processed in the following month's payroll.`,q:`What has changed about the payroll cut-off date?`,opts:['It has moved from the 20th to the 17th','It has moved to the 25th','It remains the same','It is now monthly instead of weekly'],ans:0,exp:`<em>"The payroll cut-off date will change from the 20th to the 17th."</em>`},
{passage:`<strong>Email — New Office Visitor Policy</strong><br><br>Effective immediately, all external visitors must be <strong>pre-registered</strong> by their host at least <strong>24 hours in advance</strong>. On arrival, visitors must present a <strong>valid photo ID</strong> and sign a <strong>visitor log</strong> at reception.`,q:`What must visitors present on arrival?`,opts:['A valid photo ID','A pre-printed pass','Their business card','A company authorisation letter'],ans:0,exp:`<em>"Visitors must present a valid photo ID and sign a visitor log."</em>`},
{passage:`<strong>Staff Newsletter — Long Service Awards</strong><br><br>At this year's annual dinner, we will be recognising employees who have reached <strong>10, 20, and 30 years</strong> of service. Recipients will receive a <strong>personalised certificate and gift voucher</strong>. Nominations close on <strong>30th September</strong>.`,q:`What will long service award recipients receive?`,opts:['A certificate and gift voucher','A cash bonus','An extra day off','A plaque only'],ans:0,exp:`<em>"A personalised certificate and gift voucher."</em>`},
{passage:`<strong>Email — Change of Contact Details</strong><br><br>Please note that our accounts payable email address has changed to <strong>ap@newaddress.com</strong> with effect from <strong>Monday 6th</strong>. All invoices sent to the old address will be automatically forwarded for <strong>one month only</strong>.`,q:`How long will invoices be forwarded from the old address?`,opts:['One month','Three months','Indefinitely','Two weeks'],ans:0,exp:`<em>"Invoices sent to the old address will be automatically forwarded for one month only."</em>`},
{passage:`<strong>Internal Notice — New Printing Rules</strong><br><br>All double-sided printing is now the <strong>default setting</strong> on all office printers. Single-sided printing is still available but must be <strong>manually selected</strong>. This change is part of the company's commitment to reducing paper waste by <strong>40%</strong>.`,q:`What is the company's paper reduction target?`,opts:['40%','25%','50%','30%'],ans:0,exp:`<em>"Reducing paper waste by 40%."</em>`},
{passage:`<strong>Memo — Updated Signing Authority</strong><br><br>With effect from <strong>1st June</strong>, contracts up to <strong>£10,000</strong> may be signed by department heads. Contracts between <strong>£10,001 and £50,000</strong> require approval from the CFO. Contracts above <strong>£50,000</strong> require board approval.`,q:`Who can approve a contract worth £35,000?`,opts:['The CFO','A department head','The board','Any senior manager'],ans:0,exp:`<em>"Contracts between £10,001 and £50,000 require approval from the CFO."</em>`},

{passage:`<strong>Email — Apology for Technical Issue</strong><br><br>Dear Valued Customer, we apologise for the disruption to our online platform yesterday between <strong>2:00 PM and 6:00 PM</strong>. The issue was caused by a <strong>server failure</strong> and has now been resolved. All affected orders have been processed.`,q:`What caused the disruption?`,opts:['A server failure','A cyber attack','Planned maintenance','A software update'],ans:0,exp:`<em>"The issue was caused by a server failure."</em>`},
{passage:`<strong>Notice — End of Year Party</strong><br><br>The annual end-of-year party will be held at the <strong>Meridian Ballroom</strong> on <strong>December 20th</strong>. Dinner begins at <strong>7:00 PM</strong>. Partners are welcome. Please RSVP to events@company.com by <strong>December 10th</strong>.`,q:`By when must staff RSVP?`,opts:['December 10th','December 20th','December 15th','End of November'],ans:0,exp:`<em>"Please RSVP by December 10th."</em>`},
{passage:`<strong>Subject: Staff Survey Reminder</strong><br><br>This is a reminder to complete the <strong>annual employee satisfaction survey</strong>. The survey takes approximately <strong>10 minutes</strong> and is <strong>completely anonymous</strong>. The deadline is this <strong>Friday at 5:00 PM</strong>.`,q:`What is notable about the survey?`,opts:['It is anonymous','It affects your appraisal','It takes 30 minutes','It is compulsory'],ans:0,exp:`<em>"The survey is completely anonymous."</em>`},
{passage:`<strong>Notice — Emergency Contact Update</strong><br><br>All employees are required to update their emergency contact information via the HR portal by <strong>31st March</strong>. This is part of our updated health and safety compliance requirements.`,q:`Why must employees update their emergency contacts?`,opts:['Health and safety compliance','A new IT system rollout','A company restructure','Annual policy review'],ans:0,exp:`<em>"Part of our updated health and safety compliance requirements."</em>`},
{passage:`<strong>Email — Product Update Notice</strong><br><br>Dear Customer, version <strong>4.2</strong> of our software is now available. This update includes <strong>performance improvements, bug fixes, and a new reporting dashboard</strong>. The update is free for all current subscribers. Download it via your account settings.`,q:`How can customers get the update?`,opts:['Via account settings','By contacting support','By purchasing a new licence','Via the company website'],ans:0,exp:`<em>"Download it via your account settings."</em>`},
{passage:`<strong>Job Advertisement — Customer Service Representative</strong><br><br>We are looking for an enthusiastic individual to join our customer-facing team. The role involves responding to enquiries, resolving complaints, and processing orders. <strong>No prior experience required — full training provided</strong>. Apply by <strong>28th February</strong>.`,q:`Is experience required for this role?`,opts:['No — full training provided','Yes — 2 years minimum','Yes — customer service only','Yes — a relevant degree'],ans:0,exp:`<em>"No prior experience required — full training provided."</em>`},
{passage:`<strong>Internal Email — Parking Permit Renewal</strong><br><br>Annual parking permits expire on <strong>31st March</strong>. To renew, complete the online form and submit payment of <strong>£120 per year</strong> by <strong>15th March</strong>. Permits not renewed by this date will be cancelled without notice.`,q:`How much does an annual parking permit cost?`,opts:['£120','£90','£150','£100'],ans:0,exp:`<em>"Submit payment of £120 per year."</em>`},
{passage:`<strong>Notice — Annual Leave Rollover Policy</strong><br><br>Unused annual leave may be carried over into the next year, up to a maximum of <strong>5 days</strong>. Leave not taken within <strong>3 months of the new year</strong> will be forfeited. There are no exceptions to this policy.`,q:`How many unused leave days can be carried over?`,opts:['Up to 5 days','Up to 10 days','All unused days','None'],ans:0,exp:`<em>"Up to a maximum of 5 days."</em>`},
{passage:`<strong>Announcement — New Chief Operating Officer</strong><br><br>We are pleased to announce that <strong>Mr. Daniel Park</strong> will be joining us as <strong>Chief Operating Officer</strong> on <strong>1st February</strong>. Mr. Park brings 20 years of experience in operations management across three continents.`,q:`What role will Mr. Park take on?`,opts:['Chief Operating Officer','Chief Executive Officer','Head of Operations','Finance Director'],ans:0,exp:`<em>"Joining us as Chief Operating Officer."</em>`},
{passage:`<strong>Email — Invitation to Tender</strong><br><br>We invite your company to submit a tender for the supply of <strong>IT equipment and maintenance services</strong> over a <strong>three-year period</strong>. Tenders must be submitted by <strong>5:00 PM on 14th October</strong> to procurement@company.com.`,q:`How long is the contract period?`,opts:['Three years','One year','Five years','Two years'],ans:0,exp:`<em>"Supply of IT equipment over a three-year period."</em>`},
{passage:`<strong>Internal Memo — New Sick Leave Process</strong><br><br>From <strong>1st April</strong>, employees must notify their line manager <strong>before 9:30 AM</strong> on their first day of absence. A <strong>self-certification form</strong> is required for absences of <strong>1 to 7 days</strong>. A doctor's certificate is required from <strong>day 8</strong>.`,q:`When must a doctor's certificate be provided?`,opts:['From day 8','From day 1','After 3 days','Only for extended leave'],ans:0,exp:`<em>"A doctor's certificate is required from day 8."</em>`},
{passage:`<strong>Email — Training Cancellation</strong><br><br>Dear all, we regret to inform you that the Excel training scheduled for <strong>Wednesday 5th</strong> has been cancelled due to the trainer's illness. We will be in touch to reschedule. We apologise for any inconvenience caused.`,q:`Why was the training cancelled?`,opts:['The trainer is ill','The room is unavailable','Not enough participants','A scheduling conflict'],ans:0,exp:`<em>"Cancelled due to the trainer's illness."</em>`},
{passage:`<strong>Staff Circular — Office Renovation</strong><br><br>The third-floor offices will be refurbished from <strong>Monday 7th to Friday 18th</strong>. Staff will be relocated to the <strong>hot-desking area on floor two</strong>. Please clear all personal items from your desk by <strong>Friday 4th</strong>.`,q:`Where will third-floor staff work during renovation?`,opts:['Hot-desking area on floor two','From home','The ground floor boardroom','Floor four'],ans:0,exp:`<em>"Staff will be relocated to the hot-desking area on floor two."</em>`},
{passage:`<strong>Email — Price Increase Notice</strong><br><br>Due to rising material costs, we will be increasing our prices by <strong>5%</strong> from <strong>1st August</strong>. Orders placed before this date will be processed at current prices. We appreciate your continued support.`,q:`How can customers avoid the price increase?`,opts:['Place orders before 1st August','Contact the sales team','Order in large quantities','Sign a long-term contract'],ans:0,exp:`<em>"Orders placed before this date will be processed at current prices."</em>`},
{passage:`<strong>Memo — Company Vehicle Booking</strong><br><br>Company vehicles must be booked via the <strong>fleet management system</strong> at least <strong>48 hours in advance</strong>. Vehicles returned with fuel below the minimum level will result in a <strong>charge to the employee's department</strong>.`,q:`How far in advance must vehicles be booked?`,opts:['48 hours','24 hours','One week','72 hours'],ans:0,exp:`<em>"Booked at least 48 hours in advance."</em>`},
{passage:`<strong>Notice — New Supplier Registration</strong><br><br>All new suppliers must complete a <strong>vendor registration form</strong> and provide <strong>proof of insurance and tax compliance</strong> before any contracts can be signed. Processing takes up to <strong>10 business days</strong>.`,q:`What must new suppliers provide before contracts are signed?`,opts:['Proof of insurance and tax compliance','A business plan','References from clients','A sample product'],ans:0,exp:`<em>"Proof of insurance and tax compliance."</em>`},
{passage:`<strong>Notice — Workplace Wellbeing Week</strong><br><br>From <strong>Monday 12th to Friday 16th</strong>, we will be hosting yoga, mindfulness sessions, and healthy cooking demonstrations. All activities are <strong>free of charge</strong> and open to <strong>all staff</strong>.`,q:`Who can participate in the wellbeing activities?`,opts:['All staff','Permanent staff only','Senior management','Staff who pre-register'],ans:0,exp:`<em>"Open to all staff."</em>`},
{passage:`<strong>Notice — Data Protection Refresher</strong><br><br>All employees must complete the <strong>GDPR refresher training</strong> by <strong>30th June</strong>. The online module takes approximately <strong>20 minutes</strong>. Failure to complete it will result in <strong>restricted access to company systems</strong>.`,q:`What will happen if the training is not completed?`,opts:['Restricted access to systems','Disciplinary action','Loss of annual leave','A formal warning'],ans:0,exp:`<em>"Failure to complete it will result in restricted access to company systems."</em>`},
{passage:`<strong>Email — Office Move Confirmation</strong><br><br>Our new offices at <strong>25 Harbour View, Bristol</strong> will be ready for occupation from <strong>Monday 10th September</strong>. All staff should report to the new address from that date. Car parking is available on site.`,q:`When will the new offices be ready?`,opts:['Monday 10th September','Monday 17th September','1st October','End of August'],ans:0,exp:`<em>"Ready for occupation from Monday 10th September."</em>`},
{passage:`<strong>Internal Memo — Travel Policy</strong><br><br>Employees must book all business travel through our <strong>approved travel management system</strong>. Bookings made outside this system will not be reimbursed. Hotel costs are capped at <strong>£150 per night</strong>.`,q:`What is the maximum hotel cost per night?`,opts:['£150','£100','£200','£120'],ans:0,exp:`<em>"Hotel costs are capped at £150 per night."</em>`},
{passage:`<strong>Notice — Updated Meeting Room Policy</strong><br><br>Meeting rooms must be booked through the <strong>online calendar system</strong>. Rooms not used within <strong>15 minutes of the booking start time</strong> will be automatically released. Maximum booking duration is <strong>3 hours</strong>.`,q:`What happens if a room is unused 15 minutes after the booking?`,opts:['It is automatically released','The booking is extended','A reminder is sent','Nothing happens'],ans:0,exp:`<em>"Rooms not used within 15 minutes will be automatically released."</em>`},
{passage:`<strong>Email — Welcome to New Employee Portal</strong><br><br>We are excited to launch <strong>MyCompany Hub</strong>. You can use it to view payslips, book leave, update personal details, and access HR documents. Log in with your existing company credentials from <strong>Monday 1st</strong>.`,q:`What can employees use the new portal for?`,opts:['View payslips, book leave and access HR docs','Only view payslips','Book meeting rooms only','Access the intranet only'],ans:0,exp:`<em>"View payslips, book leave, update personal details, and access HR documents."</em>`},
{passage:`<strong>Notice — New Induction Programme</strong><br><br>From <strong>next quarter</strong>, all new employees will undergo a <strong>structured three-week induction</strong> including shadowing sessions, team introductions, and a final assessment on company procedures.`,q:`How long is the new induction programme?`,opts:['Three weeks','One week','Two weeks','One month'],ans:0,exp:`<em>"A structured three-week induction."</em>`},
{passage:`<strong>Email — Order Confirmation</strong><br><br>Dear Ms. Blake, your items will be dispatched within <strong>2 business days</strong> and delivered within <strong>5–7 business days</strong>. You will receive a tracking number by email once your order has been shipped.`,q:`When will the items be dispatched?`,opts:['Within 2 business days','Within 5–7 business days','Same day','Next working day'],ans:0,exp:`<em>"Dispatched within 2 business days."</em>`},
{passage:`<strong>Memo — Office Kitchen Rules</strong><br><br>Please ensure that all food is labelled with your name and date. Items not labelled will be <strong>disposed of every Friday afternoon</strong>. The fridge is cleaned <strong>every two weeks on Wednesdays</strong>.`,q:`When are unlabelled items thrown away?`,opts:['Every Friday afternoon','Every Wednesday','Daily at closing','On the first of each month'],ans:0,exp:`<em>"Items not labelled will be disposed of every Friday afternoon."</em>`},
{passage:`<strong>Email — New Expense Claim Portal</strong><br><br>From <strong>1st February</strong>, all expense claims must be submitted through <strong>ExpensePro</strong>. Paper forms will no longer be accepted. Training sessions are available on <strong>Tuesday afternoons</strong>.`,q:`What will no longer be accepted?`,opts:['Paper forms','Electronic submissions','Late claims','Claims without line manager approval'],ans:0,exp:`<em>"Paper forms will no longer be accepted."</em>`},
{passage:`<strong>Email — Promotion Announcement</strong><br><br>We are delighted to announce that <strong>Mr. Carlos Rivera</strong> has been promoted to <strong>Head of Sales</strong>, effective <strong>1st March</strong>. Carlos has been with the company for <strong>eight years</strong> and has consistently delivered outstanding results.`,q:`How long has Carlos been with the company?`,opts:['Eight years','Five years','Ten years','Three years'],ans:0,exp:`<em>"Carlos has been with the company for eight years."</em>`},
{passage:`<strong>Memo — IT System Downtime</strong><br><br>The company ERP system will be offline for an upgrade on <strong>Saturday 14th from 6:00 AM to 2:00 PM</strong>. All transactions must be completed before <strong>Friday 5:00 PM</strong>. Access will be restored automatically after maintenance.`,q:`By what time must Friday transactions be completed?`,opts:['5:00 PM','6:00 AM Saturday','2:00 PM','End of business Thursday'],ans:0,exp:`<em>"All transactions must be completed before Friday 5:00 PM."</em>`},
{passage:`<strong>Notice — Mobile Phone Policy</strong><br><br>Personal mobile phones must be set to <strong>silent during working hours</strong>. Personal calls should be limited to <strong>break times only</strong>. Excessive personal phone use during working hours may result in a formal warning.`,q:`When can personal calls be made?`,opts:['During break times only','At any time','In the morning only','Never during work hours'],ans:0,exp:`<em>"Personal calls should be limited to break times only."</em>`},
{passage:`<strong>Workshop Registration — Business Writing</strong><br><br>One-day workshop on <strong>Thursday 5th March</strong>, 9:00 AM to 4:30 PM. Limited to <strong>12 participants</strong>. Reserve your place by emailing training@company.com by <strong>Friday 28th February</strong>.`,q:`How many participants can attend?`,opts:['12','15','10','20'],ans:0,exp:`<em>"Limited to 12 participants."</em>`},
{passage:`<strong>Subject: Restructuring Announcement</strong><br><br>Following a strategic review, the company will restructure into <strong>three divisions</strong> effective <strong>1st October</strong>. Affected employees will be contacted by HR by <strong>15th September</strong>.`,q:`By when will affected employees be contacted?`,opts:['15th September','1st October','End of September','After the restructure is complete'],ans:0,exp:`<em>"Affected employees will be contacted by HR by 15th September."</em>`},
{passage:`<strong>Notice — Free Language Classes</strong><br><br>The company is offering free <strong>Spanish and Mandarin classes</strong> to all employees starting next month. Classes run on <strong>Wednesday evenings from 6 PM to 7:30 PM</strong>. Register via the employee portal.`,q:`When do the language classes take place?`,opts:['Wednesday evenings, 6–7:30 PM','Monday mornings','Thursday lunchtimes','Friday evenings'],ans:0,exp:`<em>"Wednesday evenings from 6 PM to 7:30 PM."</em>`},
{passage:`<strong>Email — Delay in Shipment</strong><br><br>Dear Customer, we regret to inform you that order <strong>#78912</strong> has been delayed due to <strong>severe weather conditions</strong> affecting our warehouse. The new estimated delivery date is <strong>March 18th</strong>.`,q:`Why has the order been delayed?`,opts:['Severe weather conditions','A stock shortage','A system error','A customs issue'],ans:0,exp:`<em>"Delayed due to severe weather conditions."</em>`},
{passage:`<strong>Subject: Annual Report Published</strong><br><br>The company's annual report is now available on the investor relations page. Key highlights include a <strong>12% increase in revenue</strong> and a <strong>net profit of £4.2 million</strong>.`,q:`How did revenue change according to the report?`,opts:['Increased by 12%','Decreased by 12%','Increased by 4.2%','Remained unchanged'],ans:0,exp:`<em>"A 12% increase in revenue."</em>`},
{passage:`<strong>Internal Email — Charity Fundraiser</strong><br><br>This year's fundraiser will take place on <strong>Friday 22nd November</strong>. Staff are invited to wear casual clothing in exchange for a <strong>£2 donation</strong>. All proceeds go to the <strong>local food bank</strong>.`,q:`Where do all proceeds go?`,opts:['The local food bank','A national charity','The staff welfare fund','The company charity partner'],ans:0,exp:`<em>"All proceeds go to the local food bank."</em>`},
{passage:`<strong>Notice — Gym Membership Subsidy</strong><br><br>The company will subsidise gym membership up to <strong>£30 per month</strong> for all full-time employees. To claim, submit your monthly gym receipt to HR by the <strong>last working day of each month</strong>.`,q:`What is the maximum monthly subsidy?`,opts:['£30','£25','£50','£20'],ans:0,exp:`<em>"Subsidise gym membership up to £30 per month."</em>`},
{passage:`<strong>Notice — New Recycling Initiative</strong><br><br>From next month, all office floors will have separate bins for <strong>paper, plastic, and general waste</strong>. Staff are asked to familiarise themselves with the recycling guidelines posted in each <strong>kitchen area</strong>.`,q:`Where are the recycling guidelines posted?`,opts:['In each kitchen area','On the HR intranet','At reception','In the staff handbook'],ans:0,exp:`<em>"Recycling guidelines posted in each kitchen area."</em>`},
{passage:`<strong>Email — Budget Freeze Notification</strong><br><br>Due to current economic conditions, the company has implemented a <strong>budget freeze</strong> on all non-essential spending. All purchase requests above <strong>£500</strong> require <strong>board-level approval</strong> until further notice.`,q:`What is required for purchase requests above £500?`,opts:['Board-level approval','Department head approval','Finance team sign-off','No approval needed'],ans:0,exp:`<em>"All purchase requests above £500 require board-level approval."</em>`},
{passage:`<strong>Notice — Subsidised Bus Pass</strong><br><br>The company is introducing a <strong>subsidised bus pass scheme</strong> for employees commuting from the city centre. Monthly passes will be available at <strong>50% of the standard cost</strong>. Applications open from <strong>1st March</strong> via the HR portal.`,q:`What discount will employees receive on bus passes?`,opts:['50% off','25% off','75% off','Free of charge'],ans:0,exp:`<em>"Monthly passes at 50% of the standard cost."</em>`},
{passage:`<strong>Notice — Payroll Cut-off Date Change</strong><br><br>From next month, the payroll cut-off date will change from the <strong>20th to the 17th</strong> of each month. Changes to hours or expenses submitted after the 17th will be processed in the following month's payroll.`,q:`What has changed about the payroll cut-off date?`,opts:['It moved from the 20th to the 17th','It moved to the 25th','It remains the same','It is now bi-monthly'],ans:0,exp:`<em>"The cut-off date will change from the 20th to the 17th."</em>`},
{passage:`<strong>Email — New Office Visitor Policy</strong><br><br>All external visitors must be <strong>pre-registered</strong> by their host at least <strong>24 hours in advance</strong>. On arrival, visitors must present a <strong>valid photo ID</strong> and sign the visitor log at reception.`,q:`What must visitors present on arrival?`,opts:['A valid photo ID','A pre-printed pass','Their business card','A company authorisation letter'],ans:0,exp:`<em>"Visitors must present a valid photo ID."</em>`},
{passage:`<strong>Staff Newsletter — Long Service Awards</strong><br><br>At this year's annual dinner, we will recognise employees who have reached <strong>10, 20, and 30 years</strong> of service. Recipients will receive a <strong>personalised certificate and gift voucher</strong>. Nominations close <strong>30th September</strong>.`,q:`What will long service award recipients receive?`,opts:['A certificate and gift voucher','A cash bonus','An extra day off','A public commendation'],ans:0,exp:`<em>"A personalised certificate and gift voucher."</em>`},
{passage:`<strong>Memo — Updated Signing Authority</strong><br><br>Contracts up to <strong>£10,000</strong> may be signed by department heads. Contracts between <strong>£10,001 and £50,000</strong> require CFO approval. Contracts above <strong>£50,000</strong> require board approval.`,q:`Who can approve a contract worth £35,000?`,opts:['The CFO','A department head','The board','Any senior manager'],ans:0,exp:`<em>"Contracts between £10,001 and £50,000 require approval from the CFO."</em>`},
{passage:`<strong>Notice — Company Induction Day</strong><br><br>New starters joining on <strong>1st October</strong> will attend a full-day induction including a building tour, HR briefing, and introduction to company values. Lunch will be provided. Arrive at reception by <strong>8:45 AM</strong>.`,q:`What time should new starters arrive?`,opts:['8:45 AM','9:00 AM','8:30 AM','10:00 AM'],ans:0,exp:`<em>"Arrive at reception by 8:45 AM."</em>`},
{passage:`<strong>Email — Award Nomination</strong><br><br>We are pleased to inform you that you have been nominated for the <strong>Regional Business Excellence Award</strong> in the category of <strong>Best Customer Service Team</strong>. The ceremony takes place on <strong>Thursday 19th March</strong>.`,q:`For which category has the team been nominated?`,opts:['Best Customer Service Team','Best Innovation','Best Employer','Best New Product'],ans:0,exp:`<em>"Nominated in the category of Best Customer Service Team."</em>`},
{passage:`<strong>Internal Memo — Fire Drill</strong><br><br>Following the annual fire safety inspection, the next fire drill will take place on <strong>Thursday 23rd at 11:00 AM</strong>. All staff must participate. Do not use the lifts during the drill.`,q:`When is the next fire drill?`,opts:['Thursday 23rd at 11:00 AM','Friday 24th at 10:00 AM','Wednesday 22nd at 9:00 AM','Thursday 23rd at 2:00 PM'],ans:0,exp:`<em>"Thursday 23rd at 11:00 AM."</em>`},
{passage:`<strong>Email — Supplier Price Negotiation</strong><br><br>We would like to propose a <strong>10% reduction</strong> on the unit price in exchange for a <strong>12-month exclusive supply agreement</strong>. Please advise whether this is acceptable by <strong>end of next week</strong>.`,q:`What is being proposed in exchange for a price reduction?`,opts:['A 12-month exclusive supply agreement','A larger order volume','An extended payment period','A marketing partnership'],ans:0,exp:`<em>"A 12-month exclusive supply agreement."</em>`},
{passage:`<strong>Notice — Building Security Upgrade</strong><br><br>New biometric access controls will be installed on all entry points from <strong>Monday 4th</strong>. Staff must register their fingerprints with the security team before <strong>Friday 1st</strong>. Book a slot via the intranet.`,q:`By when must staff register their fingerprints?`,opts:['Friday 1st','Monday 4th','End of the month','Immediately'],ans:0,exp:`<em>"Register their fingerprints before Friday 1st."</em>`},
{passage:`<strong>Internal Email — Flexible Working Pilot</strong><br><br>Starting from <strong>1st April</strong>, we will pilot a <strong>4-day working week</strong> for customer support staff. Working hours on the four days will be extended to <strong>10 hours per day</strong>. The pilot runs for <strong>three months</strong>.`,q:`How long will the pilot run?`,opts:['Three months','One month','Six months','One year'],ans:0,exp:`<em>"The pilot will run for three months."</em>`},
{passage:`<strong>Email — Reference Request</strong><br><br>I am applying for <strong>Senior Account Manager</strong> at Vertex Solutions and have listed you as a reference. Could you complete the attached reference form and return it directly to Vertex HR by <strong>15th April</strong>?`,q:`What must the recipient return and to whom?`,opts:['A reference form to Vertex HR','A letter to the applicant','Their own CV','Nothing — verbal reference only'],ans:0,exp:`<em>"Complete the form and return it to HR at Vertex."</em>`},
{passage:`<strong>Memo — Staff Recognition Programme</strong><br><br>Launching in February: <strong>Employee of the Month</strong>. Nominations via the HR portal. The winner receives a <strong>£100 voucher</strong> and a feature in the company newsletter. Nominations open on the <strong>1st of each month</strong>.`,q:`What does the winner receive?`,opts:['A £100 voucher and newsletter feature','A cash bonus only','An extra holiday day','A promotion'],ans:0,exp:`<em>"A £100 voucher and a feature in the company newsletter."</em>`},
{passage:`<strong>Subject: Contract Update</strong><br><br>Dear Mr. Ellis, your contract will be updated from <strong>1st June</strong> to reflect your new role as <strong>Senior Project Manager</strong>. Your revised salary of <strong>£62,000 per annum</strong> takes effect from the same date. Please sign and return by <strong>20th May</strong>.`,q:`By when must Mr. Ellis return the signed contract?`,opts:['20th May','1st June','End of May','Before his next pay date'],ans:0,exp:`<em>"Please sign and return by 20th May."</em>`},
{passage:`<strong>Press Release — New CEO Appointment</strong><br><br>Vantage Group announces <strong>Ms. Ingrid Larsen</strong> as CEO, effective <strong>1st September</strong>. Ms. Larsen joins from <strong>Nordic Capital</strong>, where she served as COO for <strong>seven years</strong>.`,q:`Where did Ms. Larsen work previously?`,opts:['Nordic Capital','Vantage Group','Nordic Bank','Global Capital'],ans:0,exp:`<em>"Ms. Larsen joins from Nordic Capital."</em>`},

// ═══════════════════════════════════════
// TOEIC ENGINE
// ═══════════════════════════════════════
const LABELS = {vocab:{l:'Vocabulaire',s:'Business English — mots fréquents'},gram:{l:'Grammaire',s:'Structures clés — Parties 5 & 6'},listen:{l:'Listening',s:'Compréhension orale — Parties 1 à 4'},read:{l:'Reading',s:'Textes professionnels — Partie 7'}};
const TKEYS=['vocab','gram','listen','read'];
let tTab_cur='vocab', xp=0, isSpeaking=false, scriptRevealed={};
const tS={};
TKEYS.forEach(k=>{
  const order=shuffle([...Array(DB[k].length).keys()]);
  tS[k]={idx:0,correct:0,wrong:0,answered:false,chosenOpt:null,order};
});
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function tTab(k){
  tStopSpeech(); tTab_cur=k;
  document.querySelectorAll('.tt').forEach(t=>t.classList.remove('active'));
  const m={vocab:0,gram:1,listen:2,read:3,stats:4};
  document.querySelectorAll('.tt')[m[k]]?.classList.add('active');
  tRender();
}

function tClickOpt(oi){
  if(tTab_cur==='stats')return;
  const k=tTab_cur,s=tS[k];
  if(s.answered)return;
  s.answered=true; s.chosenOpt=oi;
  const q=DB[k][s.order[s.idx%s.order.length]];
  if(oi===q.ans){s.correct++;xp+=10;}else{s.wrong++;xp+=2;}
  tRender();
  setTimeout(()=>{
    if(tTab_cur===k&&tS[k].answered){
      s.idx++; s.answered=false; s.chosenOpt=null;
      // reshuffle when we've gone through all
      if(s.idx%s.order.length===0) shuffle(s.order);
      tRender();
    }
  },1600);
}

function tSpeak(text,btnId){
  tStopSpeech();
  if(!window.speechSynthesis){alert('Utilisez Chrome ou Edge.');return;}
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-GB';u.rate=0.87;isSpeaking=true;
  const btn=document.getElementById(btnId);
  if(btn){btn.textContent='Arrêter';btn.classList.add('playing');}
  u.onend=()=>{isSpeaking=false;if(btn){btn.textContent='Réécouter';btn.classList.remove('playing');}};
  u.onerror=()=>{isSpeaking=false;};
  window.speechSynthesis.speak(u);
}
function tStopSpeech(){if(window.speechSynthesis)window.speechSynthesis.cancel();isSpeaking=false;}
function tTogglePlay(text,btnId){if(isSpeaking){tStopSpeech();const btn=document.getElementById(btnId);if(btn){btn.textContent='Réécouter';btn.classList.remove('playing');}}else tSpeak(text,btnId);}
function tRevealScript(text){const el=document.getElementById('tls');if(el){el.innerHTML=text;el.classList.add('shown');}}

function tRender(){
  const main=document.getElementById('tm');
  document.getElementById('xpNum').textContent=xp;
  if(tTab_cur==='stats'){tRenderStats(main);return;}
  const k=tTab_cur,s=tS[k],done=s.correct+s.wrong;
  const qi=s.order[s.idx%s.order.length];
  const q=DB[k][qi];
  const lab=LABELS[k];
  const pct=Math.round((s.idx%s.order.length)/s.order.length*100);

  const progH=`<div class="tpw"><div class="tpb"><div class="tpf" style="width:${pct}%"></div></div><div class="tpl">${s.idx} répondues</div></div>`;
  const msH=done>0?`<div class="tms">
    <div class="tm"><div class="tmv cok">${s.correct}</div><div class="tml">Correctes</div></div>
    <div class="tm"><div class="tmv cbad">${s.wrong}</div><div class="tml">Erreurs</div></div>
    <div class="tm"><div class="tmv cmid">${Math.round(s.correct/done*100)}%</div><div class="tml">Réussite</div></div>
  </div>`:'';
  const secH=`<div class="tsl"><div class="tsk">${lab.l}</div><div class="tsn">${lab.s}</div></div>`;

  const letters=['A','B','C','D'];
  let listenH='';
  if(k==='listen'){
    const key=`tl-${s.idx}`;const rev=scriptRevealed[key];
    listenH=`<div class="tlib">
      <div class="tls${rev?' shown':''}" id="tls">${rev?q.audio:'Écoute, puis clique sur la bonne réponse.'}</div>
      <div class="tlr">
        <button class="tbpl" id="tbpl" onclick="event.stopPropagation();tTogglePlay(${JSON.stringify(q.audio)},'tbpl')">Écouter</button>
        <span class="tlc">${q.context||''}</span>
        <button class="tbsc" onclick="event.stopPropagation();scriptRevealed['${key}']=true;tRevealScript(${JSON.stringify(q.audio)})">Voir le script</button>
      </div></div>`;
  }
  const passH=q.passage?`<div class="tpass">${q.passage}</div>`:'';
  const optsH=(q.opts||[]).map((o,oi)=>{
    let cls='top',mark='';
    if(s.answered){if(oi===q.ans){cls+=' tok';mark='<span class="topm">✓</span>';}else if(oi===s.chosenOpt&&oi!==q.ans){cls+=' tbad';mark='<span class="topm">✗</span>';}}
    return `<div class="${cls}" onclick="tClickOpt(${oi})"><div class="topl">${letters[oi]}</div><div class="topt">${o}</div>${mark}</div>`;
  }).join('');
  const isOk=s.chosenOpt===q.ans;
  const explH=s.answered?`<div class="texpl${isOk?'':' wrong'}"><strong>${isOk?'Bonne réponse.':'Réponse correcte : '+(q.opts[q.ans]||'')}</strong><br>${q.exp||''}</div>`:'';

  main.innerHTML=`${progH}${msH}${secH}
    <div class="tqc">
      <div class="tqh"><span class="tqsn">${lab.l}</span></div>
      <div class="tqb">${listenH}${passH}<div class="tqt">${q.q}</div>
      <div class="tops${s.answered?' locked':''}">${optsH}</div>${explH}</div>
    </div>`;
}

function tRenderStats(main){
  let tc=0,tw=0;TKEYS.forEach(k=>{tc+=tS[k].correct;tw+=tS[k].wrong;});
  const done=tc+tw,pct=done>0?Math.round(tc/done*100):0,est=Math.round(200+(pct/100)*590);
  const lvl=pct>=80?'Niveau B2/C1 — Excellent':pct>=65?'Niveau B1/B2 — Bon':pct>=50?'Niveau A2/B1 — Intermédiaire':'Niveau A1/A2 — Continue !';
  main.innerHTML=`<div class="tsh">
    <div class="tsk" style="margin-bottom:8px">Score global</div>
    <div class="tsp">${pct}%</div>
    <div style="font-size:13px;color:#737373">${done} questions répondues</div>
    <div class="tst"><div class="tstn">${est}</div><div class="tstl">Score TOEIC estimé / 495</div></div>
    <div class="tslv">${lvl}</div>
  </div>
  <div class="tms" style="margin-bottom:16px">
    <div class="tm"><div class="tmv cok">${tc}</div><div class="tml">Correctes</div></div>
    <div class="tm"><div class="tmv cbad">${tw}</div><div class="tml">Erreurs</div></div>
    <div class="tm"><div class="tmv cmid">${done>0?Math.round(tc/done*100):0}%</div><div class="tml">Réussite</div></div>
  </div>
  ${TKEYS.map(k=>{
    const s=tS[k],d=s.correct+s.wrong,p=d>0?Math.round(s.correct/d*100):0;
    const col=p>=70?'#1a7a4a':p>=50?'#b8860b':'#c0392b';
    return `<div class="tsr" onclick="tTab('${k}')">
      <div class="tsri"><div><div class="tsrn">${LABELS[k].l}</div><div class="tsrs">${d} répondues · ${s.correct} correctes · ${DB[k].length} total</div></div>
      <div class="tsrp" style="color:${d>0?col:'#b8b8b8'}">${d>0?p+'%':'—'}</div></div>
      <div class="tsprb"><div class="tsprf" style="width:${p}%;background:${col}"></div></div>
    </div>`;
  }).join('')}
  <button class="tbr" onclick="tReset()">Réinitialiser les scores</button>`;
}
function tReset(){TKEYS.forEach(k=>{tS[k].correct=0;tS[k].wrong=0;tS[k].idx=0;tS[k].answered=false;tS[k].chosenOpt=null;shuffle(tS[k].order);});xp=0;tTab('vocab');}

  {week:4,type:'normal',phrase:`"I am not afraid to speak."`,words:[['fear','peur'],['courage','courage'],['confidence','confiance'],['calm','calme'],['control','contrôle']],duolingo:20,yt:`<a href="https://www.youtube.com/watch?v=2WzSUqbM9fI" target="_blank">Easy English — Overcoming Fear of Speaking</a>`},
  {week:4,type:'normal',phrase:`"My English is clearer."`,words:[['clear','clair'],['clean','propre'],['sound','son'],['voice','voix'],['word','mot']],duolingo:20,yt:`<a href="https://www.youtube.com/watch?v=n4NVPg2kHv4" target="_blank">Rachel's English — Clear Pronunciation</a>`},
  {week:4,type:'normal',phrase:"5 phrases personnelles détaillées",words:[['fluent','courant'],['smooth','fluide'],['natural','naturel'],['stable','stable'],['strong','fort']],duolingo:25,yt:`<a href="https://www.youtube.com/watch?v=iSaEQwHbZpY" target="_blank">BBC: 6 Minute English — Language Fluency</a>`},
  {week:4,type:'normal',phrase:"Mini monologue de 2 minutes",words:[['story','histoire'],['explain','expliquer'],['describe','décrire'],['detail','détail'],['example','exemple']],duolingo:25,yt:`<a href="https://www.youtube.com/watch?v=FMTCZg3HxL0" target="_blank">Easy English — How to Tell a Story</a>`},
  {week:4,type:'normal',phrase:"Mini discours perso — parle librement 3 min",words:[],duolingo:30,yt:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC Learning English — Révision générale</a>`},
  {week:4,type:'final'}
];
let dDay=0;
function dWL(w){return{1:'Semaine 1',2:'Semaine 2',3:'Semaine 3',4:'Semaine 4'}[w]||'';}
function dRender(){
  const main=document.getElementById('dm');
  const btn=document.getElementById('dbn2');
  const btnP=document.getElementById('dbpv');
  document.getElementById('dpf').style.width=Math.round(dDay/30*100)+'%';
  document.getElementById('dpl').textContent=dDay+' / 30';
  btnP.disabled=dDay===0;
  if(dDay>=dDays.length){
    main.innerHTML=`<div class="dds"><div class="be">🏆</div><div class="ddtt">Défi terminé !</div><p class="ddts">30 jours d'effort. Tu peux être fier(e) de toi.<br>Continue avec le même système — la régularité est ta super-puissance.</p></div>`;
    btn.disabled=true;btn.innerHTML='Défi terminé 🎉';return;
  }
  btn.disabled=false;
  const d=dDays[dDay];
  if(d.type==='light'){
    main.innerHTML=`<div class="dwb">✦ <span>${dWL(d.week)}</span> — Jour ${dDay+1}</div>
      <div class="ddc"><div class="dch"><div><div class="ddn">Jour ${dDay+1} · 30</div><div class="ddt">Jour Libre</div></div><span class="dtb dbl">Repos</span></div>
      <div class="dlm"><div class="dle">🌙</div><div class="dlt">Repos mental</div><div class="dls">Regarde une vidéo qui te plaît.<br>Dis une phrase en anglais.<br>C'est tout — l'habitude compte.</div></div></div>`;
    btn.innerHTML=`Jour ${dDay+2} →`;return;
  }
  if(d.type==='final'){
    main.innerHTML=`<div class="dwb">✦ <span>Semaine 4</span> — Jour 30</div>
      <div class="ddc"><div class="dch"><div><div class="ddn">Jour 30 · 30</div><div class="ddt">Final Day</div></div><span class="dtb dbf">Final</span></div>
      <div class="dcb"><div class="dfb"><div class="tr">🏆</div><p>Tu es arrivé(e) jusqu'ici.<br>C'est une vraie victoire.</p></div>
      <div class="dtr"><div class="dti">⏱</div><div class="dtc"><div class="dtl">Duolingo</div><div class="dtt">30 minutes</div></div></div>
      <div class="dtr"><div class="dti">📺</div><div class="dtc"><div class="dtl">Vidéo</div><div class="dtt">Vidéo anglaise libre</div></div></div>
      <div class="dtr"><div class="dti">🗣</div><div class="dtc"><div class="dtl">Expression</div><div class="dtt">Parler 5 minutes en anglais</div></div></div>
      </div></div>`;
    btn.innerHTML='Terminer le défi 🎉';return;
  }
  const wH=d.words.length?`<div class="dwc">${d.words.map(([en,fr])=>`<span class="dc"><strong>${en}</strong><span class="dcf"> = ${fr}</span></span>`).join('')}</div>`:'';
  main.innerHTML=`<div class="dwb">✦ <span>${dWL(d.week)}</span> — Jour ${dDay+1}</div>
    <div class="ddc"><div class="dch"><div><div class="ddn">Jour ${dDay+1} · 30</div><div class="ddt">Jour ${dDay+1}</div></div><span class="dtb dbn">Actif</span></div>
    <div class="dcb">
      <div class="dtr"><div class="dti">⏱</div><div class="dtc"><div class="dtl">Duolingo</div><div class="dtt">${d.duolingo} minutes</div></div></div>
      <div class="dtr"><div class="dti">📺</div><div class="dtc"><div class="dtl">YouTube</div><div class="dtt">${d.yt}</div></div></div>
      <div class="dtr"><div class="dti">🗣</div><div class="dtc"><div class="dtl">Phrase du jour</div><div class="dtt">${d.phrase}</div></div></div>
      ${d.words.length?`<div class="dtr dwr"><div class="dti">📚</div><div class="dtc"><div class="dtl">Vocabulaire</div>${wH}</div></div>`:''}
    </div></div>`;
  btn.innerHTML=dDay<28?`Jour ${dDay+2} →`:'Dernier jour →';
}
function dNext(){if(dDay<=dDays.length){dDay++;dRender();document.getElementById('dm').scrollIntoView({behavior:'smooth'});}}
function dPrev(){if(dDay>0){dDay--;dRender();document.getElementById('dm').scrollIntoView({behavior:'smooth'});}}

// INIT
tTab('vocab');
dRender();
</script>
