<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Défi Anglais 30 Jours</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0f1623;
    --surface2: #151e2e;
    --accent: #4ade80;
    --accent2: #38bdf8;
    --accent3: #a78bfa;
    --text: #e8edf5;
    --muted: #5a6a82;
    --border: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .flag {
    font-size: 22px;
    line-height: 1;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  .progress-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    padding: 20px 16px 120px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Week label */
  .week-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .week-badge span { color: var(--accent2); }

  /* Day card */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .day-number {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .day-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    margin-top: 2px;
    background: linear-gradient(135deg, var(--text) 60%, var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .day-type-badge {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .badge-normal { background: rgba(74,222,128,0.12); color: var(--accent); }
  .badge-light  { background: rgba(167,139,250,0.12); color: var(--accent3); }
  .badge-final  { background: rgba(251,191,36,0.12); color: #fbbf24; }

  /* Sections inside card */
  .card-body {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
  }

  .task-icon {
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .task-content {
    flex: 1;
    min-width: 0;
  }

  .task-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .task-text {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.45;
    word-break: break-word;
  }

  .task-text a {
    color: var(--accent2);
    text-decoration: none;
    font-weight: 500;
  }

  /* Words row */
  .words-row {
    background: rgba(74,222,128,0.05);
    border-color: rgba(74,222,128,0.15);
  }
  .words-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .chip {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--accent);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
  }
  .chip-fr {
    color: var(--muted);
    font-weight: 400;
  }

  /* Light day */
  .light-message {
    text-align: center;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .light-emoji { font-size: 44px; }
  .light-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent3);
  }
  .light-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* Final day */
  .final-banner {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(74,222,128,0.08));
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    margin-bottom: 4px;
  }
  .final-banner .trophy { font-size: 40px; margin-bottom: 6px; }
  .final-banner p { font-size: 13px; color: var(--muted); }

  /* Done state */
  .done-state {
    text-align: center;
    padding: 40px 20px;
  }
  .done-state .big-emoji { font-size: 64px; margin-bottom: 16px; }
  .done-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .done-sub { font-size: 15px; color: var(--muted); line-height: 1.6; }

  /* ── BOTTOM NAV / BUTTON ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(8,12,20,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
  }

  .btn-next {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #16a34a);
    color: #03200a;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-next:active { transform: scale(0.97); opacity: 0.9; }
  .btn-next:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: default;
  }

  .btn-arrow { font-size: 18px; }

  /* Prev button */
  .nav-row {
    display: flex;
    gap: 10px;
  }

  .btn-prev {
    width: 52px;
    flex-shrink: 0;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-prev:active { color: var(--text); border-color: var(--text); }
  .btn-prev:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="app-title">Défi Anglais</div>
    <div class="flag">🇬🇧</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 30</div>
  </div>
</header>

<main id="main"></main>

<div class="bottom-bar">
  <div class="nav-row">
    <button class="btn-prev" id="btnPrev" onclick="prevDay()" disabled>←</button>
    <button class="btn-next" id="btnNext" onclick="nextDay()">
      Commencer le défi <span class="btn-arrow">→</span>
    </button>
  </div>
</div>

<script>
// words format: [english, french]
const days = [
  // SEMAINE 1
  {week:1, type:"normal", phrase:`"I am learning English."`, words:[["learn","apprendre"],["work","travailler"],["try","essayer"],["want","vouloir"],["English","l'anglais"]], duolingo:5, youtube:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC: 6 Minute English — Daily Routines</a>`},
  {week:1, type:"normal", phrase:`"I work today."`, words:[["today","aujourd'hui"],["job","travail"],["company","entreprise"],["tired","fatigué"],["day","jour"]], duolingo:5, youtube:`<a href="https://www.youtube.com/watch?v=2WzSUqbM9fI" target="_blank">Easy English — What do you do for work?</a>`},
  {week:1, type:"normal", phrase:`"It's difficult but I try."`, words:[["difficult","difficile"],["easy","facile"],["try","essayer"],["again","encore"],["better","mieux"]], duolingo:5, youtube:`<a href="https://www.youtube.com/watch?v=VqckOEcbfpo" target="_blank">English Addict — Common English Phrases</a>`},
  {week:1, type:"normal", phrase:`"I want to improve my English."`, words:[["improve","améliorer"],["speak","parler"],["understand","comprendre"],["learn","apprendre"],["more","plus"]], duolingo:5, youtube:`<a href="https://www.youtube.com/watch?v=WMFGnl5BKFM" target="_blank">Mr Duncan — How to Improve Your English</a>`},
  {week:1, type:"normal", phrase:`"My pronunciation is not good but I learn."`, words:[["sound","son"],["word","mot"],["mouth","bouche"],["accent","accent"],["speak","parler"]], duolingo:5, youtube:`<a href="https://www.youtube.com/watch?v=n4NVPg2kHv4" target="_blank">Rachel's English — English Pronunciation Basics</a>`},
  {week:1, type:"normal", phrase:`"I am tired." / "I continue."`, words:[["tired","fatigué"],["energy","énergie"],["continue","continuer"],["rest","se reposer"],["focus","se concentrer"]], duolingo:7, youtube:`<a href="https://www.youtube.com/watch?v=iSaEQwHbZpY" target="_blank">BBC: 6 Minute English — Sleep & Rest</a>`},
  {week:1, type:"light"},
  // SEMAINE 2
  {week:2, type:"normal", phrase:`"I learn every day."`, words:[["everyday","quotidien"],["practice","pratiquer"],["habit","habitude"],["progress","progrès"],["goal","objectif"]], duolingo:8, youtube:`<a href="https://www.youtube.com/watch?v=FMTCZg3HxL0" target="_blank">Easy English — Daily Habits</a>`},
  {week:2, type:"normal", phrase:`"I want to progress."`, words:[["progress","progrès"],["future","futur"],["plan","plan"],["change","changer"],["improve","améliorer"]], duolingo:8, youtube:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC Learning English — Making Plans</a>`},
  {week:2, type:"normal", phrase:`"I understand more."`, words:[["understand","comprendre"],["more","plus"],["less","moins"],["slow","lent"],["fast","rapide"]], duolingo:10, youtube:`<a href="https://www.youtube.com/watch?v=VqckOEcbfpo" target="_blank">English Addict — Understanding Native Speakers</a>`},
  {week:2, type:"normal", phrase:`"I try to speak."`, words:[["speak","parler"],["voice","voix"],["sound","son"],["sentence","phrase"],["word","mot"]], duolingo:10, youtube:`<a href="https://www.youtube.com/watch?v=2WzSUqbM9fI" target="_blank">Easy English — Street Interviews</a>`},
  {week:2, type:"normal", phrase:`"My accent is improving."`, words:[["accent","accent"],["pronunciation","prononciation"],["mouth","bouche"],["sound","son"],["clear","clair"]], duolingo:10, youtube:`<a href="https://www.youtube.com/watch?v=n4NVPg2kHv4" target="_blank">Rachel's English — American Accent Training</a>`},
  {week:2, type:"normal", phrase:"3 phrases libres (ce que tu ressens)", words:[["think","penser"],["feel","ressentir"],["believe","croire"],["know","savoir"],["try","essayer"]], duolingo:12, youtube:`<a href="https://www.youtube.com/watch?v=iSaEQwHbZpY" target="_blank">BBC: 6 Minute English — Feelings & Emotions</a>`},
  {week:2, type:"light"},
  // SEMAINE 3
  {week:3, type:"normal", phrase:`"I can speak a little."`, words:[["little","un peu"],["more","plus"],["better","mieux"],["confident","confiant"],["calm","calme"]], duolingo:12, youtube:`<a href="https://www.youtube.com/watch?v=FMTCZg3HxL0" target="_blank">Easy English — Talking About Yourself</a>`},
  {week:3, type:"normal", phrase:`"I am more confident."`, words:[["confident","confiant"],["courage","courage"],["try","essayer"],["effort","effort"],["success","succès"]], duolingo:15, youtube:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC: 6 Minute English — Self Confidence</a>`},
  {week:3, type:"normal", phrase:"3 phrases sur ta vie perso", words:[["story","histoire"],["life","vie"],["work","travail"],["dream","rêve"],["goal","objectif"]], duolingo:15, youtube:`<a href="https://www.youtube.com/watch?v=VqckOEcbfpo" target="_blank">English Addict — Talking About Your Life</a>`},
  {week:3, type:"normal", phrase:`"I express myself."`, words:[["express","exprimer"],["explain","expliquer"],["describe","décrire"],["talk","parler"],["share","partager"]], duolingo:15, youtube:`<a href="https://www.youtube.com/watch?v=2WzSUqbM9fI" target="_blank">Easy English — Expressing Opinions</a>`},
  {week:3, type:"normal", phrase:`"My English is better."`, words:[["better","meilleur"],["stronger","plus fort"],["stable","stable"],["clear","clair"],["fluent","fluide"]], duolingo:15, youtube:`<a href="https://www.youtube.com/watch?v=n4NVPg2kHv4" target="_blank">Rachel's English — Speak More Fluently</a>`},
  {week:3, type:"normal", phrase:"5 phrases libres sur n'importe quel sujet", words:[["connect","connecter"],["understand","comprendre"],["answer","répondre"],["question","question"],["speak","parler"]], duolingo:15, youtube:`<a href="https://www.youtube.com/watch?v=iSaEQwHbZpY" target="_blank">BBC: 6 Minute English — Communication</a>`},
  {week:3, type:"light"},
  // SEMAINE 4
  {week:4, type:"normal", phrase:`"I speak more easily."`, words:[["easy","facile"],["flow","fluidité"],["natural","naturel"],["smooth","fluide"],["calm","calme"]], duolingo:20, youtube:`<a href="https://www.youtube.com/watch?v=FMTCZg3HxL0" target="_blank">Easy English — Natural Conversations</a>`},
  {week:4, type:"normal", phrase:`"I understand conversations."`, words:[["conversation","conversation"],["discussion","discussion"],["talk","discuter"],["exchange","échange"],["share","partager"]], duolingo:20, youtube:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC: 6 Minute English — Real Conversations</a>`},
  {week:4, type:"normal", phrase:"5 phrases : donne ton avis sur un sujet", words:[["opinion","opinion"],["idea","idée"],["think","penser"],["believe","croire"],["view","point de vue"]], duolingo:20, youtube:`<a href="https://www.youtube.com/watch?v=VqckOEcbfpo" target="_blank">English Addict — Giving Your Opinion</a>`},
  {week:4, type:"normal", phrase:`"I am not afraid to speak."`, words:[["fear","peur"],["courage","courage"],["confidence","confiance"],["calm","calme"],["control","contrôle"]], duolingo:20, youtube:`<a href="https://www.youtube.com/watch?v=2WzSUqbM9fI" target="_blank">Easy English — Overcoming Fear of Speaking</a>`},
  {week:4, type:"normal", phrase:`"My English is clearer."`, words:[["clear","clair"],["clean","propre"],["sound","son"],["voice","voix"],["word","mot"]], duolingo:20, youtube:`<a href="https://www.youtube.com/watch?v=n4NVPg2kHv4" target="_blank">Rachel's English — Clear Pronunciation</a>`},
  {week:4, type:"normal", phrase:"5 phrases personnelles détaillées", words:[["fluent","courant"],["smooth","fluide"],["natural","naturel"],["stable","stable"],["strong","fort"]], duolingo:25, youtube:`<a href="https://www.youtube.com/watch?v=iSaEQwHbZpY" target="_blank">BBC: 6 Minute English — Language Fluency</a>`},
  {week:4, type:"normal", phrase:"Mini monologue de 2 minutes", words:[["story","histoire"],["explain","expliquer"],["describe","décrire"],["detail","détail"],["example","exemple"]], duolingo:25, youtube:`<a href="https://www.youtube.com/watch?v=FMTCZg3HxL0" target="_blank">Easy English — How to Tell a Story</a>`},
  {week:4, type:"normal", phrase:"Mini discours perso — parle librement 3 min", words:[], duolingo:30, youtube:`<a href="https://www.youtube.com/watch?v=8dO5E3UOiBs" target="_blank">BBC Learning English — Révision générale</a>`},
  {week:4, type:"final"}
];

let day = 0;

function getWeekLabel(w) {
  const labels = {1:"Semaine 1", 2:"Semaine 2", 3:"Semaine 3", 4:"Semaine 4"};
  return labels[w] || "";
}

function render() {
  const main = document.getElementById('main');
  const btnNext = document.getElementById('btnNext');
  const btnPrev = document.getElementById('btnPrev');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');

  // Progress
  const pct = Math.round((day / 30) * 100);
  fill.style.width = pct + '%';
  label.textContent = day + ' / 30';

  // Prev button
  btnPrev.disabled = day === 0;

  if (day >= days.length) {
    // DONE
    main.innerHTML = `
      <div class="done-state">
        <div class="big-emoji">🏆</div>
        <div class="done-title">Défi terminé !</div>
        <p class="done-sub">30 jours d'effort. Tu peux être fier(e) de toi.<br>Continue avec le même système — la régularité est ta super-puissance.</p>
      </div>`;
    btnNext.disabled = true;
    btnNext.innerHTML = 'Défi terminé 🎉';
    return;
  }

  btnNext.disabled = false;

  const d = days[day];

  if (d.type === 'light') {
    const colors = ['var(--accent3)', 'var(--accent2)', 'var(--accent)'];
    main.innerHTML = `
      <div class="week-badge">✦ <span>${getWeekLabel(d.week)}</span> — Jour ${day+1}</div>
      <div class="day-card">
        <div class="card-header">
          <div>
            <div class="day-number">Jour ${day+1} · 30</div>
            <div class="day-title">Jour Libre</div>
          </div>
          <span class="day-type-badge badge-light">Repos 🧠</span>
        </div>
        <div class="light-message">
          <div class="light-emoji">🌙</div>
          <div class="light-title">Repos mental</div>
          <div class="light-sub">Regarde une vidéo qui te plaît.<br>Dis une phrase en anglais.<br>C'est tout — l'habitude compte.</div>
        </div>
      </div>`;
    btnNext.innerHTML = `Jour ${day+2} <span class="btn-arrow">→</span>`;
    return;
  }

  if (d.type === 'final') {
    main.innerHTML = `
      <div class="week-badge">✦ <span>Semaine 4</span> — Jour 30</div>
      <div class="day-card">
        <div class="card-header">
          <div>
            <div class="day-number">Jour 30 · 30</div>
            <div class="day-title">Final Day</div>
          </div>
          <span class="day-type-badge badge-final">🏆 Final</span>
        </div>
        <div class="card-body">
          <div class="final-banner">
            <div class="trophy">🏆</div>
            <p>Tu es arrivé(e) jusqu'ici.<br>C'est une vraie victoire.</p>
          </div>
          <div class="task-row">
            <div class="task-icon">⏱</div>
            <div class="task-content">
              <div class="task-label">Duolingo</div>
              <div class="task-text">30 minutes</div>
            </div>
          </div>
          <div class="task-row">
            <div class="task-icon">📺</div>
            <div class="task-content">
              <div class="task-label">Vidéo</div>
              <div class="task-text">Vidéo anglaise libre</div>
            </div>
          </div>
          <div class="task-row">
            <div class="task-icon">🗣</div>
            <div class="task-content">
              <div class="task-label">Expression</div>
              <div class="task-text">Parler 5 minutes en anglais</div>
            </div>
          </div>
          <div class="task-row">
            <div class="task-icon">🎯</div>
            <div class="task-content">
              <div class="task-label">Objectif</div>
              <div class="task-text">Confiance + Fluidité</div>
            </div>
          </div>
        </div>
      </div>`;
    btnNext.innerHTML = `Terminer le défi 🎉`;
    return;
  }

  // Normal day
  const nextLabel = day < 29 ? `Jour ${day+2} <span class="btn-arrow">→</span>` : `Dernier jour 🏆`;
  const wordsHTML = d.words.length
    ? `<div class="words-chips">${d.words.map(([en,fr])=>`<span class="chip"><strong>${en}</strong><span class="chip-fr"> = ${fr}</span></span>`).join('')}</div>`
    : '';

  main.innerHTML = `
    <div class="week-badge">✦ <span>${getWeekLabel(d.week)}</span> — Jour ${day+1}</div>
    <div class="day-card">
      <div class="card-header">
        <div>
          <div class="day-number">Jour ${day+1} · 30</div>
          <div class="day-title">Jour ${day+1}</div>
        </div>
        <span class="day-type-badge badge-normal">Actif ✓</span>
      </div>
      <div class="card-body">
        <div class="task-row">
          <div class="task-icon">⏱</div>
          <div class="task-content">
            <div class="task-label">Duolingo</div>
            <div class="task-text">${d.duolingo} minutes</div>
          </div>
        </div>
        <div class="task-row">
          <div class="task-icon">📺</div>
          <div class="task-content">
            <div class="task-label">YouTube</div>
            <div class="task-text">${d.youtube}</div>
          </div>
        </div>
        <div class="task-row">
          <div class="task-icon">🗣</div>
          <div class="task-content">
            <div class="task-label">Phrase du jour</div>
            <div class="task-text">${d.phrase}</div>
          </div>
        </div>
        ${d.words.length ? `
        <div class="task-row words-row">
          <div class="task-icon">📚</div>
          <div class="task-content">
            <div class="task-label">Vocabulaire</div>
            ${wordsHTML}
          </div>
        </div>` : ''}
      </div>
    </div>`;

  btnNext.innerHTML = nextLabel;
}

function nextDay() { if (day <= days.length) { day++; render(); window.scrollTo({top:0,behavior:'smooth'}); } }
function prevDay() { if (day > 0) { day--; render(); window.scrollTo({top:0,behavior:'smooth'}); } }

render();
</script>
</body>
</html>
