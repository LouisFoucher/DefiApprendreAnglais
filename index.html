<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English App</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300;1,600&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.app-switcher{position:sticky;top:0;z-index:300;background:#0e0e0e;}
.app-switcher-inner{max-width:480px;margin:0 auto;width:100%;display:flex;padding:10px 16px 0;gap:4px;}
.app-btn{flex:1;padding:10px 12px 12px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;}
.app-btn.active-toeic{color:#f8f7f4;border-bottom-color:#f8f7f4;}
.app-btn.active-defi{color:#4ade80;border-bottom-color:#4ade80;}
.panel{display:none;} .panel.visible{display:block;}

/* TOEIC */
#pt{background:#f8f7f4;color:#0e0e0e;min-height:calc(100vh - 44px);}
#pt header{position:sticky;top:44px;z-index:200;background:rgba(248,247,244,.96);backdrop-filter:blur(16px);border-bottom:1px solid #e4e4e0;}
.th{max-width:480px;margin:0 auto;padding:14px 20px 0;display:flex;align-items:baseline;justify-content:space-between;}
.tlogo{font-family:'Fraunces',serif;font-size:18px;font-weight:900;letter-spacing:-.4px;color:#0e0e0e;}
.tlogo span{font-style:italic;font-weight:300;}
.txp{font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:#737373;}
.txp em{font-style:normal;color:#0e0e0e;font-weight:900;}
.ttw{max-width:480px;margin:0 auto;padding:0 20px;overflow-x:auto;scrollbar-width:none;}
.ttw::-webkit-scrollbar{display:none;}
.tts{display:flex;padding-top:10px;}
.tt{padding:8px 14px 10px;font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:#b8b8b8;border:none;background:none;cursor:pointer;border-bottom:1.5px solid transparent;white-space:nowrap;transition:color .18s,border-color .18s;}
.tt.active{color:#0e0e0e;border-bottom-color:#0e0e0e;}
#pt main{max-width:480px;margin:0 auto;padding:22px 20px 40px;}
.tpw{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.tpb{flex:1;height:2px;background:#e4e4e0;border-radius:99px;overflow:hidden;}
.tpf{height:100%;background:#0e0e0e;border-radius:99px;transition:width .4s ease;}
.tpl{font-size:11px;font-weight:500;color:#737373;font-variant-numeric:tabular-nums;}
.tms{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.tm{border:1px solid #e4e4e0;border-radius:10px;padding:10px 8px;text-align:center;background:#fff;}
.tmv{font-family:'Fraunces',serif;font-size:22px;font-weight:900;line-height:1;margin-bottom:2px;}
.tml{font-size:9px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:#737373;}
.cok{color:#1a7a4a;}.cbad{color:#c0392b;}.cmid{color:#737373;}
.tsl{margin-bottom:14px;}
.tsk{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#737373;margin-bottom:3px;}
.tsn{font-family:'Fraunces',serif;font-size:20px;font-weight:900;letter-spacing:-.3px;color:#0e0e0e;}
.tqc{background:#fff;border:1px solid #e4e4e0;border-radius:16px;overflow:hidden;animation:tfu .26s ease;}
@keyframes tfu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.tqh{padding:13px 18px;border-bottom:1px solid #e4e4e0;display:flex;align-items:center;justify-content:space-between;}
.tqsn{font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:#737373;}
.tqb{padding:18px 18px 20px;}
.tpass{background:#f8f7f4;border-left:2px solid #0e0e0e;border-radius:0 8px 8px 0;padding:13px 15px;margin-bottom:18px;font-size:13px;line-height:1.75;color:#737373;}
.tpass strong{color:#0e0e0e;font-weight:600;}
.tlib{border:1px solid #e4e4e0;border-radius:10px;padding:14px 16px;margin-bottom:18px;background:#f8f7f4;}
.tls{font-size:13px;line-height:1.7;color:#b8b8b8;font-style:italic;margin-bottom:12px;}
.tls.shown{color:#737373;font-style:normal;}
.tlr{display:flex;align-items:center;gap:10px;}
.tbpl{padding:8px 14px;border:1.5px solid #0e0e0e;border-radius:7px;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#0e0e0e;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;}
.tbpl.playing{background:#0e0e0e;color:#fff;}
.tlc{font-size:11px;color:#737373;flex:1;}
.tbsc{font-size:11px;font-weight:500;color:#737373;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;white-space:nowrap;}
.tqt{font-size:15px;font-weight:400;line-height:1.65;color:#0e0e0e;margin-bottom:16px;}
.tops{display:flex;flex-direction:column;gap:8px;}
.top{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #e4e4e0;border-radius:10px;background:#fff;cursor:pointer;transition:border-color .12s,background .12s;}
.top:active:not(.tok):not(.tbad){transform:scale(.99);}
.tops.locked .top{cursor:default;pointer-events:none;}
.top.tok{border-color:#1a7a4a;background:rgba(26,122,74,.05);}
.top.tbad{border-color:#c0392b;background:rgba(192,57,43,.04);}
.topl{width:26px;height:26px;flex-shrink:0;border:1.5px solid #e4e4e0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#737373;transition:all .12s;}
.top.tok .topl{border-color:#1a7a4a;background:#1a7a4a;color:#fff;}
.top.tbad .topl{border-color:#c0392b;background:#c0392b;color:#fff;}
.topt{font-size:14px;font-weight:400;color:#0e0e0e;flex:1;line-height:1.4;}
.topm{font-size:13px;font-weight:700;flex-shrink:0;color:#1a7a4a;}
.top.tbad .topm{color:#c0392b;}
.texpl{margin-top:14px;padding:13px 15px;border-radius:10px;font-size:13px;line-height:1.65;color:#737373;border-left:2px solid #1a7a4a;background:rgba(26,122,74,.04);}
.texpl.wrong{border-left-color:#c0392b;background:rgba(192,57,43,.03);}
.texpl strong{color:#0e0e0e;font-weight:600;}
.tsh{background:#fff;border:1px solid #e4e4e0;border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:16px;}
.tsp{font-family:'Fraunces',serif;font-size:68px;font-weight:900;line-height:1;color:#0e0e0e;margin-bottom:4px;}
.tst{display:inline-block;margin:14px auto 10px;border:1px solid #e4e4e0;border-radius:10px;padding:10px 22px;}
.tstn{font-family:'Fraunces',serif;font-size:32px;font-weight:900;color:#0e0e0e;}
.tstl{font-size:10px;color:#737373;margin-top:2px;letter-spacing:.4px;}
.tslv{font-size:12px;color:#737373;margin-top:8px;}
.tsr{background:#fff;border:1px solid #e4e4e0;border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;}
.tsri{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
.tsrn{font-size:13px;font-weight:500;}
.tsrs{font-size:11px;color:#737373;margin-top:1px;}
.tsrp{font-family:'Fraunces',serif;font-size:24px;font-weight:900;}
.tsprb{height:2px;background:#f8f7f4;}
.tsprf{height:100%;transition:width .5s ease;}
.tbr{width:100%;padding:14px;background:#0e0e0e;color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:16px;transition:opacity .15s;}
.tbr:active{opacity:.8;}

/* DÉFI */
#pd{background:#080c14;color:#e8edf5;min-height:calc(100vh - 44px);}
#pd header{position:sticky;top:44px;z-index:200;background:rgba(8,12,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 20px 12px;}
.dht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dat{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#4ade80,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.dpw{display:flex;align-items:center;gap:10px;}
.dpb{flex:1;height:5px;background:#151e2e;border-radius:99px;overflow:hidden;}
.dpf{height:100%;background:linear-gradient(90deg,#4ade80,#38bdf8);border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.dpl{font-size:12px;font-weight:500;color:#5a6a82;white-space:nowrap;min-width:40px;text-align:right;}
#pd main{position:relative;z-index:1;padding:20px 16px 130px;max-width:480px;margin:0 auto;}
.dwb{display:inline-flex;align-items:center;gap:6px;background:#0f1623;border:1px solid rgba(255,255,255,.06);border-radius:99px;padding:5px 12px;font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:#5a6a82;margin-bottom:14px;}
.dwb span{color:#38bdf8;}
.ddc{background:#0f1623;border:1px solid rgba(255,255,255,.06);border-radius:20px;overflow:hidden;animation:dsu .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes dsu{from{opacity:0;transform:translateY(24px) scale(.98);}to{opacity:1;transform:none;}}
.dch{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.ddn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:#5a6a82;text-transform:uppercase;}
.ddt{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1.1;margin-top:2px;background:linear-gradient(135deg,#e8edf5 60%,#5a6a82);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.dtb{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:.4px;flex-shrink:0;}
.dbn{background:rgba(74,222,128,.12);color:#4ade80;}
.dbl{background:rgba(167,139,250,.12);color:#a78bfa;}
.dbf{background:rgba(251,191,36,.12);color:#fbbf24;}
.dcb{padding:16px 20px 20px;display:flex;flex-direction:column;gap:10px;}
.dtr{display:flex;align-items:flex-start;gap:12px;background:#151e2e;border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.06);}
.dti{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px;}
.dtc{flex:1;min-width:0;}
.dtl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#5a6a82;margin-bottom:2px;}
.dtt{font-size:14px;font-weight:400;color:#e8edf5;line-height:1.45;word-break:break-word;}
.dtt a{color:#38bdf8;text-decoration:none;font-weight:500;}
.dwr{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.15);}
.dwc{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.dc{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;line-height:1.4;}
.dcf{color:#5a6a82;font-weight:400;}
.dlm{text-align:center;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.dle{font-size:44px;}
.dlt{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#a78bfa;}
.dls{font-size:14px;color:#5a6a82;line-height:1.5;}
.dfb{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(74,222,128,.08));border:1px solid rgba(251,191,36,.2);border-radius:14px;padding:16px;text-align:center;margin-bottom:4px;}
.dfb .tr{font-size:40px;margin-bottom:6px;}
.dfb p{font-size:13px;color:#5a6a82;}
.dds{text-align:center;padding:40px 20px;}
.dds .be{font-size:64px;margin-bottom:16px;}
.ddtt{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#4ade80,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ddts{font-size:15px;color:#5a6a82;line-height:1.6;}
.dbb{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,12,20,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:14px 20px calc(14px + env(safe-area-inset-bottom));}
.dnr{max-width:480px;margin:0 auto;display:flex;gap:10px;}
.dbn2{flex:1;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#4ade80,#16a34a);color:#03200a;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,opacity .15s;}
.dbn2:active{transform:scale(.97);opacity:.9;}
.dbn2:disabled{background:#151e2e;color:#5a6a82;cursor:default;}
.dbpv{width:52px;flex-shrink:0;padding:16px;border:1px solid rgba(255,255,255,.06);border-radius:14px;background:#0f1623;color:#5a6a82;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s;}
.dbpv:active{color:#e8edf5;border-color:#e8edf5;}
.dbpv:disabled{opacity:.3;cursor:default;}
</style>
</head>
<body>

<div class="app-switcher">
  <div class="app-switcher-inner">
    <button class="app-btn active-toeic" id="sw-toeic" onclick="switchApp('toeic')">TOEIC</button>
    <button class="app-btn" id="sw-defi" onclick="switchApp('defi')">Défi Anglais</button>
  </div>
</div>

<!-- TOEIC -->
<div class="panel visible" id="pt">
  <header>
    <div class="th"><div class="tlogo">TOEIC <span>prep</span></div><div class="txp"><em id="xpNum">0</em> xp</div></div>
    <div class="ttw"><div class="tts">
      <button class="tt" onclick="tTab('vocab')">Vocabulaire</button>
      <button class="tt" onclick="tTab('gram')">Grammaire</button>
      <button class="tt" onclick="tTab('listen')">Listening</button>
      <button class="tt" onclick="tTab('read')">Reading</button>
      <button class="tt" onclick="tTab('stats')">Résultats</button>
    </div></div>
  </header>
  <main id="tm"></main>
</div>

<!-- DÉFI -->
<div class="panel" id="pd">
  <header>
    <div class="dht"><div class="dat">Défi Anglais — 30 Jours</div></div>
    <div class="dpw"><div class="dpb"><div class="dpf" id="dpf" style="width:0%"></div></div><div class="dpl" id="dpl">0 / 30</div></div>
  </header>
  <main id="dm"></main>
  <div class="dbb"><div class="dnr">
    <button class="dbpv" id="dbpv" onclick="dPrev()" disabled>←</button>
    <button class="dbn2" id="dbn2" onclick="dNext()">Commencer le défi →</button>
  </div></div>
</div>

<script>
// ═══════════════════════════════════════
// APP SWITCHER
// ═══════════════════════════════════════
function switchApp(a){
  document.getElementById('pt').classList.toggle('visible',a==='toeic');
  document.getElementById('pd').classList.toggle('visible',a==='defi');
  document.getElementById('sw-toeic').className='app-btn'+(a==='toeic'?' active-toeic':'');
  document.getElementById('sw-defi').className='app-btn'+(a==='defi'?' active-defi':'');
  if(a==='defi')dRender();
}

// ═══════════════════════════════════════
// TOEIC DATA — 744 questions (200 vocab · 200 gram · 156 listen · 188 read)
// ═══════════════════════════════════════
const DB = {

vocab:[
{q:`The HR department will ___ all applications before the interview.`,opts:['review','remove','reveal','reverse'],ans:0,exp:`<strong>Review</strong> = examiner. <em>Review applications</em> = étudier les candidatures.`},
{q:`The meeting has been ___ to next Tuesday due to the storm.`,opts:['postponed','proposed','promoted','processed'],ans:0,exp:`<strong>Postponed</strong> = reporté. <em>Postpone a meeting</em> = reporter une réunion.`},
{q:`Employees must obtain ___ from their manager before taking time off.`,opts:['approval','appointment','appearance','application'],ans:0,exp:`<strong>Approval</strong> = approbation. <em>Obtain approval</em> = obtenir l'accord.`},
{q:`The company will ___ a new software system across all departments.`,opts:['implement','imply','imprint','impose'],ans:0,exp:`<strong>Implement</strong> = mettre en place. Très courant en management et IT.`},
{q:`Please send the ___ to the client by end of day.`,opts:['quotation','qualification','quantity','quarter'],ans:0,exp:`<strong>Quotation</strong> = devis. <em>Send a quotation</em> = envoyer un devis.`},
{q:`The new branch will be ___ in the city centre next spring.`,opts:['located','locked','linked','listed'],ans:0,exp:`<strong>Located</strong> = situé. <em>The office is located in…</em>`},
{q:`We need to ___ our budget before the end of the quarter.`,opts:['allocate','allow','alert','alter'],ans:0,exp:`<strong>Allocate</strong> = allouer/affecter. <em>Allocate a budget.</em>`},
{q:`The technician will ___ the faulty equipment tomorrow morning.`,opts:['replace','repeat','report','request'],ans:0,exp:`<strong>Replace</strong> = remplacer. <em>Replace faulty equipment.</em>`},
{q:`All staff are ___ to attend the safety training session.`,opts:['required','retired','revised','rejected'],ans:0,exp:`<strong>Required</strong> = obligatoire. <em>Required to attend</em> = tenu d'assister.`},
{q:`The board voted to ___ the merger after months of negotiation.`,opts:['approve','appoint','appeal','assign'],ans:0,exp:`<strong>Approve</strong> = approuver. <em>Approve a merger</em> = approuver une fusion.`},
{q:`We must ___ our expenses carefully to stay within budget.`,opts:['monitor','mention','modify','manage'],ans:0,exp:`<strong>Monitor</strong> = surveiller. <em>Monitor expenses.</em>`},
{q:`The product launch was ___ due to production issues.`,opts:['delayed','denied','delivered','deployed'],ans:0,exp:`<strong>Delayed</strong> = retardé. <em>The launch was delayed.</em>`},
{q:`Please ___ to the attached document for further details.`,opts:['refer','report','reply','request'],ans:0,exp:`<strong>Refer to</strong> = se référer à. Courant dans les emails pro.`},
{q:`The company has decided to ___ its marketing strategy next year.`,opts:['revise','remove','retain','relay'],ans:0,exp:`<strong>Revise</strong> = réviser/modifier. <em>Revise a strategy.</em>`},
{q:`All employees must sign the ___ agreement before starting work.`,opts:['confidentiality','confirmation','contribution','consolidation'],ans:0,exp:`<strong>Confidentiality agreement</strong> = accord de confidentialité (NDA).`},
{q:`The factory is operating at full ___ this month.`,opts:['capacity','capability','capture','capital'],ans:0,exp:`<strong>Capacity</strong> = capacité. <em>Full capacity</em> = à plein régime.`},
{q:`The sales team exceeded its ___ for the third quarter in a row.`,opts:['target','talent','tenure','task'],ans:0,exp:`<strong>Target</strong> = objectif. <em>Exceed a target</em> = dépasser un objectif.`},
{q:`We are looking for candidates with strong ___ skills.`,opts:['interpersonal','international','internal','interim'],ans:0,exp:`<strong>Interpersonal skills</strong> = compétences relationnelles.`},
{q:`The company ___ a press release about the new partnership.`,opts:['issued','implied','imposed','inquired'],ans:0,exp:`<strong>Issue a press release</strong> = publier un communiqué de presse.`},
{q:`She was promoted to ___ manager after five years with the company.`,opts:['regional','regular','reliable','relevant'],ans:0,exp:`<strong>Regional manager</strong> = directeur régional.`},
{q:`The financial report will be ___ to all shareholders next week.`,opts:['distributed','dismissed','discussed','declared'],ans:0,exp:`<strong>Distributed</strong> = distribué. <em>Distribute a report.</em>`},
{q:`Please ___ your travel itinerary at least 48 hours in advance.`,opts:['submit','suggest','suppress','support'],ans:0,exp:`<strong>Submit</strong> = soumettre. <em>Submit an itinerary.</em>`},
{q:`The new office ___ includes a gym and a rooftop terrace.`,opts:['facility','faculty','factor','fashion'],ans:0,exp:`<strong>Facility</strong> = installation. <em>Office facilities</em> = équipements du bureau.`},
{q:`We will need to ___ our production process to meet demand.`,opts:['streamline','strengthen','structure','stimulate'],ans:0,exp:`<strong>Streamline</strong> = rationaliser/optimiser.`},
{q:`Please ___ the invoice before the end of the month.`,opts:['process','produce','propose','promote'],ans:0,exp:`<strong>Process an invoice</strong> = traiter une facture.`},
{q:`The company is planning to ___ into the Asian market.`,opts:['expand','export','expose','execute'],ans:0,exp:`<strong>Expand into</strong> = s'étendre sur un marché.`},
{q:`The CEO will ___ a speech at the annual shareholders' meeting.`,opts:['deliver','demand','deploy','describe'],ans:0,exp:`<strong>Deliver a speech</strong> = prononcer un discours.`},
{q:`She has been with the firm for over a decade and is highly ___.`,opts:['experienced','exchanged','expressed','expanded'],ans:0,exp:`<strong>Experienced</strong> = expérimenté.`},
{q:`The new regulation will ___ all companies with more than 50 employees.`,opts:['affect','allow','assist','arrange'],ans:0,exp:`<strong>Affect</strong> = affecter/toucher. Ne pas confondre avec <em>effect</em> (nom).`},
{q:`The HR team is conducting a ___ to measure employee satisfaction.`,opts:['survey','service','support','session'],ans:0,exp:`<strong>Survey</strong> = sondage/enquête. <em>Conduct a survey.</em>`},
